			var rArrActList = [["s", "a", "u"], ["a", "u", "s"], ["u", "a", "s"], ["u", "s", "a"], ["s", "u", "a"]];
			
			function doGetActivity(rObj) {
				document.getElementById("div_Main_1").style.display = "none";
				document.getElementById("divQuestionPanel").style.display = "block";
				document.getElementById("divQuestionMark").style.display = "none";
				document.getElementById("divCorrectTextPanel").style.display = "none";
				document.getElementById("divAnswerPanel").style.display = "none";
				//document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnReplay").style.display = "none";
				//document.getElementById("divBtnNext").style.display = "none";
				document.getElementById("divDragPanel").style.display = "none";
				document.getElementById("divPicDisable").style.display = "none";
					
				for (var i=1; i<=3; i++) {
					var rInnerHTML = "";
					rInnerHTML += '<div id="divActPicAndText_' + i + '" name="divActPicAndText" style="position:absolute; width:100%; height:100%; left:0px; top:-55px; font-size:500%; color:#ff0000; display:inline-block;"></div>';
					document.getElementById("divActPicAndTextSub_"+i).innerHTML = rInnerHTML;
				}			
				var rRndId = Math.floor(Math.random() * rArrActList.length);
				for (var i=0; i<rArrActList[rRndId].length; i++) {
					document.getElementById("divActPicAndText_" + (i+1)).innerHTML = rArrActList[rRndId][i];
				}
				
				
				if (rObj==null || rObj==undefined || rObj=="" || rObj.id=="divBtnReplay" || rObj.id=="divBtnBack") {
					//document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnReplay").style.display = "none";
					//document.getElementById("divBtnNext").style.display = "none";
					document.getElementById("div_Main_1").style.display = "block";
				} else {
				if (rObj.id=="divBtnNext") {
					//document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnReplay").style.display = "none";
					//document.getElementById("divBtnNext").style.display = "none";
					
					document.getElementById("div_Main_1").style.display = "none";
				} }
			}

			function doShowQuestionMarkAndDragPanel() {
				document.getElementById("divQuestionPanel").style.display = "none";
				document.getElementById("divQuestionMark").style.display = "block";
				document.getElementById("divDragPanel").style.display = "block";
			}
			
			function doCheckAllDropCorrect() {
				var rArrDropImgList = [];
				for (var i=1; i<=3; i++) {
					rArrDropImgList.push(document.getElementById("divActPicAndTextMain_"+i).getElementsByTagName("div")[0].getElementsByTagName("div")[0].innerHTML);
				}
				
				if (rArrDropImgList[0].toLowerCase()=="a" && rArrDropImgList[1].toLowerCase()=="s" && rArrDropImgList[2].toLowerCase()=="u") {
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divCorrectTextPanel").style.display = "block";
					document.getElementById("divAnswerPanel").style.display = "block";
					//document.getElementById("divBtnBack").style.display = "inline-block";
					//document.getElementById("divBtnNext").style.display = "none";
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divPicDisable").style.display = "block";
				}
			}
		</script>

			$(".clsBox").draggable({
				axis: "x", containment: "#divImgCol", revert: true,
				drag: function(event, ui) {
					for (var i=1; i<=3; i++) {
						document.getElementById("divActPicAndTextMain_"+i).style.zIndex = "auto";
					}
					document.getElementById(this.id).style.zIndex = 9998;
				}
			});
			
			$(".clsBox").droppable({
				drop: function(event, ui) {
					var rDragName = "";
					var rDropName = "";
					rDragName = ui.draggable.attr("id");
					rDropName = this.id;
					if (rDropName!="") {
						var rOldDropInnerHTML = document.getElementById(rDropName).innerHTML;
						document.getElementById(rDropName).innerHTML = document.getElementById(rDragName).innerHTML;
						document.getElementById(rDragName).innerHTML = rOldDropInnerHTML;
						document.getElementById(rDropName).style.zIndex = "1001";
						document.getElementById(rDragName).style.zIndex = "1002";
					}
					doCheckAllDropCorrect();
				}
			});
		</script>
