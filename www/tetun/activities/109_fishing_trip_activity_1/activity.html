<!doctype html>
<html lang="en">
	<head>
		<title>Timor Home App</title>
		
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
		<link rel="shortcut icon" href="image/logo.jpg" />
		<link rel="apple-touch-icon" href="image/logo.jpg" />
		-->
		<link rel="stylesheet" type="text/css" href="../../css/jquery-ui.css" />
		<link rel="stylesheet" type="text/css" href="../../css/jqueryui-style.css" />
		<link rel="stylesheet" type="text/css" href="../../css/font_awesome.css" />
		<link rel="stylesheet" type="text/css" href="../../css/main.css" />
		
		<style>
			.clsPic {
				width: 170px;
				height: auto;
			}
			.clsDivider2Line {
				position:absolute; 
				width:2px; 
				height:100%; 
				background-color:#e4e4e4; 
				display:inline-block;
			}
			.clsBox {
				position:relative; 
				width:210px; 
				height:100%; 
				top:0px; 
				text-align:center; 
				cursor:pointer; 
				display:inline-block;
				border: 0px solid red;
			}
		</style>		

		<script src="../../js/jquery-3.6.0.js"></script>
		<script src="../../js/jquery-ui.js"></script>
		<script type="text/javascript" src="../../js/main.js"></script>
		
		<script language="javascript">
			var rArrPicList = [["2.png", "1.png", "3.png"], ["1.png", "3.png", "2.png"], ["3.png", "1.png", "2.png"], ["3.png", "2.png", "1.png"], ["2.png", "3.png", "1.png"]];

			function doGetRndPicList() {
				document.getElementById("divQuestionMark").style.display = "block";
				document.getElementById("divCorrectTextPanel").style.display = "none";
				document.getElementById("divReplayBtnPanel").style.display = "block";
				document.getElementById("divPicDisable").style.display = "none";
					
				for (var i=1; i<=3; i++) {
					var rInnerHTML = '<img id="imgActPic_' + i + '" name="imgActPic_' + i + '" class="clsPic" />';
					document.getElementById("divActPic_"+i).innerHTML = rInnerHTML;
				}			
				var rRndId = Math.floor(Math.random() * rArrPicList.length);
				for (var i=0; i<rArrPicList[rRndId].length; i++) {
					document.getElementById("imgActPic_" + (i+1)).src = "images/" + rArrPicList[rRndId][i];
				}
			}			
			
			function doCheckAllDropCorrect() {
				var rArrDropImgList = [];
				for (var i=1; i<=3; i++) {
					var rImgSrc = document.getElementById("divActPicMain_"+i).getElementsByTagName("div")[0].getElementsByTagName("img")[0].src;
					var rImgSrcSPL = rImgSrc.split("/");
					var rPicName = rImgSrcSPL[rImgSrcSPL.length-1];
					rArrDropImgList.push(rPicName);
				}
				if (rArrDropImgList[0]=="1.png" && rArrDropImgList[1]=="2.png" && rArrDropImgList[2]=="3.png") {
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divCorrectTextPanel").style.display = "block";
					document.getElementById("divReplayBtnPanel").style.display = "block";
					document.getElementById("divPicDisable").style.display = "block";
				}
			}
		</script>		
	</head>

	<body bgcolor="#000000">
		<div id="divWrapper" name="divWrapper" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid red;">
			<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
				<tr>
					<td width="100%" height="100%" align="center" valign="middle">
						<div id="divContainer" name="divContainer" style="position:relative; width:730px; height:310px; background-color:#ffffff; border:0px solid blue;">
							<div style="position:relative; width:100%; height:100%; left:0px; top:0px; background:transparent; border:0px solid green;">
								<!--
								<div style="position:relative; width:100%; height:auto; border:0px solid #333333;">
									<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
										<tr>
											<td align="left" valign="middle">
												<div style="font-size:25px;"></div>
											</td>
										</tr>
									</table>
								</div>
								-->
								<div style="position:absolute; width:100%; height:auto; left:0px; top:15px; border:0px solid #333333;">
									<div style="position:relative; width:100%; height:auto; border:0px solid #666666;">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div id="divQuestionMark" name="divQuestionMark" style="display:block;">
														<img width="auto" height="70" src="../../images/question_mark.png" />
													</div>
													<div id="divCorrectTextPanel" name="divCorrectTextPanel" style="display:none;">
														<div style="position:relative; top:-5px; font-size:300%; display:inline-block;">
															Loos
														</div>
														<div style="width:5px; display:inline-block;"></div>
														<div style="display:inline-block;">
															<img width="auto" height="55" src="../../images/tick.png" />
														</div>														
													</div>
												</td>
											</tr>
										</table>									
									</div>
								</div>
								<div style="position:absolute; width:91%; height:160px; left:5px; top:86px; text-align:center; border:0px solid blue;">
									<div id="divImgCol" name="divImgCol" style="position:absolute; width:100%; height:100%; left:0px; top:0px; text-align:center; border:0px solid #666666; display:inline-block;">
										<div id="divActPicMain_1" name="divActPicMain" class="clsBox" style="z-index:1001;">
											<div id="divActPic_1" name="divActPic" style="position:absolute; width:100%; height:100%; left:0px; top:0px; text-align:center; display:inline-block;">
												<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
													<tr>
														<td width="100%" align="center" valign="bottom">
															<img id="imgActPic_1" name="imgActPic" class="clsPic" src="images/1.png" />
														</td>
													</tr>
												</table>
											</div>
										</div>
										<div class="clsDivider2Line" style="left:223px;"></div>
										<div id="divActPicMain_2" name="divActPicMain" class="clsBox" style="z-index:1002;">
											<div id="divActPic_2" name="divActPic" style="position:absolute; width:100%; height:100%; left:0px; top:0px; text-align:center; display:inline-block;">
												<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
													<tr>
														<td width="100%" align="center" valign="bottom">
															<img id="imgActPic_2" name="imgActPic" class="clsPic" src="images/2.png" />
														</td>
													</tr>
												</table>
											</div>
										</div>
										<div class="clsDivider2Line" style="left:439px;"></div>
										<div id="divActPicMain_3" name="divActPicMain" class="clsBox" style="z-index:1003;">
											<div id="divActPic_3" name="divActPic" style="position:absolute; width:100%; height:100%; left:0px; top:0px; text-align:center; display:inline-block;">
												<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
													<tr>
														<td width="100%" align="center" valign="bottom">
															<img id="imgActPic_3" name="imgActPic" class="clsPic" src="images/3.png" />
														</td>
													</tr>
												</table>
											</div>
										</div>
									</div>
								</div>
								<div id="divPicDisable" name="divPicDisable" style="position:absolute; width:630px; height:230px; left:0px; top:0px; border:0px solid blue; display:none; z-index:9999;"></div>
								<div id="divReplayBtnPanel" name="divReplayBtnPanel" style="position:absolute; width:100%; height:auto; left:0px; bottom:15px; border:0px solid #333333; cursor:default; display:none;">
									<div style="position:relative; width:100%; height:auto; border:0px solid #666666;">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="border:0px solid red; cursor:pointer; display:inline-block;" onclick="javascript:doGetRndPicList();">
														<img width="auto" height="40" src="../../images/replay.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
								</div>								
							</div>
							
							<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red;">
								<div id="divPosterImage" name="divPosterImage" class="clsMacroPosterImage" style="cursor:pointer;">
									<img id="imgPoster" name="imgPoster" width="100%" height="100%" />
								</div>							
								<div id="divBtnBackArrow" name="divBtnBackArrow" class="clsMacroBack" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'P');">
									<img width="100%" height="100%" src="../../images/back_arrow.png" />
								</div>
								<div id="divBtnNextArrow" name="divBtnNextArrow" class="clsMacroNext" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'N');">
									<img width="100%" height="100%" src="../../images/next_arrow.png" />
								</div>					
								<div id="divBtnHome" name="divBtnHome" class="clsMacroHome" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'H');">
									<img width="100%" height="100%" src="../../images/home.png" />
								</div>
							</div>						
						</div>
					</td>
				</tr>
			</table>
		</div>
		<script language="javascript">
			$(".clsBox").draggable({
				axis: "x", containment: "#divImgCol", revert: true,
				drag: function(event, ui) {
					for (var i=1; i<=3; i++) {
						document.getElementById("divActPicMain_"+i).style.zIndex = "auto";
					}
					document.getElementById(this.id).style.zIndex = 9998;
				}
			});
			
			$(".clsBox").droppable({
				drop: function(event, ui) {
					var rDragName = "";
					var rDropName = "";
					rDragName = ui.draggable.attr("id");
					rDropName = this.id;
					if (rDropName!="") {
						var rOldDropInnerHTML = document.getElementById(rDropName).innerHTML;
						document.getElementById(rDropName).innerHTML = document.getElementById(rDragName).innerHTML;
						document.getElementById(rDragName).innerHTML = rOldDropInnerHTML;
						document.getElementById(rDropName).style.zIndex = "1001";
						document.getElementById(rDragName).style.zIndex = "1002";
					}
					doCheckAllDropCorrect();
				}
			});			
		</script>
		
		<script language="javascript">
			doGetRndPicList();
			doResetMainNavButton();
		</script>		
	</body>
</html>
