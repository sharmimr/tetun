<!doctype html>
<html lang="en">
	<head>
		<title>Timor Home App</title>
		
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
		<link rel="shortcut icon" href="image/logo.jpg" />
		<link rel="apple-touch-icon" href="image/logo.jpg" />
		-->
		<link rel="stylesheet" type="text/css" href="../../css/jquery-ui.css" />
		<link rel="stylesheet" type="text/css" href="../../css/jqueryui-style.css" />
		<link rel="stylesheet" type="text/css" href="../../css/font_awesome.css" />
		<link rel="stylesheet" type="text/css" href="../../css/main.css" />
		
		<style>
		</style>		

		<script src="../../js/jquery-3.6.0.js"></script>
		<script src="../../js/jquery-ui.js"></script>
		<script type="text/javascript" src="../../js/main.js"></script>
		
		<script language="javascript">
			var rCountNum = 5;
			var rArrImageList = ["ball_1.png", "ball_2.png", "ball_3.png", "ball_2.png", "ball_1.png"];
			var rArrNumberList = ["number_1.png", "number_2.png", "number_3.png", "number_2.png", "number_1.png"];
			var rListIndex = 0;
			var rDispType = "SEQ";
			
			function doResetAct() {
				rArrImageList = ["ball_1.png", "ball_2.png", "ball_3.png", "ball_2.png", "ball_1.png"];
				rArrNumberList = ["number_1.png", "number_2.png", "number_3.png", "number_2.png", "number_1.png"];
				rListIndex = 0;
				rDispType = "SEQ";
				
				document.getElementById("divFinger").style.display = "block";
				document.getElementById("divQuestionMark").style.display = "block";
				document.getElementById("divNumber").style.display = "none";
				document.getElementById("divNextArrowSmall").style.display = "none";

				doSetUpActAndShow();
			}
			
			function doSetUpActAndShow() {
				var rImage = "";
				var rNumber = "";

				rImage = rArrImageList[rListIndex];
				rNumber = rArrNumberList[rListIndex];

				document.getElementById("imgActMainPicture").src = "images/" + rImage;
				document.getElementById("imgNumber").src = "images/" + rNumber;
				
				if (rDispType=="RND") {
					rArrImageList.splice(rListIndex, 1);
					rArrNumberList.splice(rListIndex, 1);
				}
				
				if (rArrImageList.length==0) {
					rArrImageList = ["ball_1.png", "ball_2.png", "ball_3.png"];
					rArrNumberList = ["number_1.png", "number_2.png", "number_3.png"];
				}
				
				if (rListIndex<=0 && rDispType == "SEQ") {
					document.getElementById("divBtnReplay").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "block";
				}
				
				//document.getElementById("imgQuestionMark").src = "../../images/question_mark_big.gif?ID=" + Math.random();
			}
			
			function doShowNumber(rObj) {
				if (rObj.style.cursor=="pointer") {
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divNumber").style.display = "block";
					document.getElementById("divNextArrowSmall").style.display = "block";
				}
			}
			
			function doGetNext(rObj) {
				if (rObj.style.cursor=="pointer") {
					if (rDispType=="SEQ") {
						rListIndex++;
						if (rListIndex>=rCountNum) {
							rDispType = "RND";
							rArrImageList = ["ball_1.png", "ball_2.png", "ball_3.png"];
							rArrNumberList = ["number_1.png", "number_2.png", "number_3.png"];
							rListIndex = Math.floor(Math.random() * rArrImageList.length);
						}
					} else {
					if (rDispType=="RND") {
						rListIndex = Math.floor(Math.random() * rArrImageList.length);
					} }
					document.getElementById("divFinger").style.display = "block";
					document.getElementById("divQuestionMark").style.display = "block";
					document.getElementById("divNumber").style.display = "none";
					document.getElementById("divNextArrowSmall").style.display = "none";
					
					doSetUpActAndShow();
				}
			}

			function doReplay(rObj) {
				if (rObj.style.cursor=="pointer") {
					doResetAct();
				}
			}
		</script>		
	</head>

	<body bgcolor="#000000">
		<div id="divWrapper" name="divWrapper" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid red;">
			<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
				<tr>
					<td width="100%" height="100%" align="center" valign="middle">
						<div id="divContainer" name="divContainer" style="position:relative; width:730px; height:310px; background-color:#ffffff; border:0px solid blue;">
							<div style="position:absolute; width:100%; height:100%; left:0px; top:0px; background:transparent; border:0px solid green;">
								<!--
								<div style="position:relative; width:100%; height:auto; border:0px solid #333333;">
									<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
										<tr>
											<td align="left" valign="middle">
												<div style="font-size:25px;"></div>
											</td>
										</tr>
									</table>
								</div>
								-->
								<div style="position:absolute; width:100%; height:90%; left:0px; top:10px; border:0px solid green;">
									<div id="divFinger" name="divFinger" style="position:absolute; width:535; height:275px; left:100px; top:0px; border:0px solid blue; display:block;">
										<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
											<tr>
												<td align="left" valign="middle">
													<div>
														<img id="imgActMainPicture" name="imgActMainPicture" width="auto" height="210" src="images/ball_1.png" />
													</div>
												</td>
											</tr>
										</table>										
									</div>
									<div id="divQuestionMark" name="divQuestionMark" style="position:absolute; width:535; height:225px; left:425px; top:0px; border:0px solid green; cursor:pointer; display:block;">
										<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
											<tr>
												<td align="left" valign="middle">
													<div style="position:relative; top:15px; cursor:pointer; display:inline-block;" onclick="javascript:doShowNumber(this);">
														<img id="imgQuestionMark" width="80" height="auto" src="../../images/question_mark_small.gif" />
													</div>
												</td>
											</tr>
										</table>										
									</div>	
									<div id="divNumber" name="divNumber" style="position:absolute; width:535; height:225px; left:450px; top:0px; border:0px solid green; display:none;">
										<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
											<tr>
												<td align="left" valign="middle">
													<div style="position:relative; top:25px;">
														<img id="imgNumber" name="imgNumber" width="auto" height="88" src="images/number_1.png" />
													</div>
												</td>
											</tr>
										</table>										
									</div>									
									<div id="divNextArrowSmall" name="divNextArrowSmall" style="position:absolute; width:70px; height:auto; left:540px; top:110px; cursor:pointer; display:none;" onclick="javascript:doGetNext(this);">
										<img width="100%" height="auto" src="../../images/next_arrow.png" />
									</div>									
								</div>
								<div id="divBottomBtnPanel" name="divBottomBtnPanel" style="position:absolute; width:100%; height:auto; left:0px; bottom:30px; border:0px solid #333333; cursor:default; display:block;">
									<div id="divBtnReplay" name="divBtnReplay" style="position:relative; top:3px; border:0px solid #666666; cursor:default; display:inline-block;">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="cursor:pointer; display:inline-block;" onclick="javascript:doReplay(this);">
														<img width="auto" height="40" src="../../images/replay.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
								</div>								
							</div>
							
							<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red;">
								<div id="divPosterImage" name="divPosterImage" class="clsMacroPosterImage" style="cursor:pointer;">
									<img id="imgPoster" name="imgPoster" width="100%" height="100%" />
								</div>							
								<div id="divBtnBackArrow" name="divBtnBackArrow" class="clsMacroBack" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'P');">
									<img width="100%" height="100%" src="../../images/back_arrow.png" />
								</div>
								<div id="divBtnNextArrow" name="divBtnNextArrow" class="clsMacroNext" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'N');">
									<img width="100%" height="100%" src="../../images/next_arrow.png" />
								</div>					
								<div id="divBtnHome" name="divBtnHome" class="clsMacroHome" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'H');">
									<img width="100%" height="100%" src="../../images/home.png" />
								</div>
							</div>
						</div>
					</td>
				</tr>
			</table>
		</div>
		
		<script language="javascript">
			doResetAct();
			doResetMainNavButton();
		</script>
	</body>
</html>
