		<style>
			.clsImageCenter {
				position: absolute; 
				width: 100%; 
				height: 40%; 
				left: 0; 
				top: 40px;
			    display: flex; 
			    justify-content: center;

		<script src="../../js/jquery-3.6.0.js"></script>

		<script language="javascript">
			var rCountNum = 3;
			var rArrActList = [{DivList:["divActMainImage_1"], Answer:"ida~number_1.png"}, {DivList:["divActMainImage_2"], Answer:"rua~number_2.png"}, {DivList:["divActMainImage_3"], Answer:"tolu~number_3.png"}];
			var rListIndex = 0;
			var rDispType = "SEQ";
			
			function doResetAct() {
				rArrActList = [{DivList:["divActMainImage_1"], Answer:"ida~number_1.png"}, {DivList:["divActMainImage_2"], Answer:"rua~number_2.png"}, {DivList:["divActMainImage_3"], Answer:"tolu~number_3.png"}];
				rListIndex = 0;
				rDispType = "SEQ";
				
				doSetUpActAndShow();
			}
		
			function doGetNext(rObj) {
				if (rObj.style.cursor=="pointer") {
					if (rDispType=="SEQ") {
						rListIndex++;
						if (rListIndex>=rCountNum) {
							rDispType = "RND";
							rArrActList = [{DivList:["divActMainImage_1"], Answer:"ida~number_1.png"}, {DivList:["divActMainImage_2"], Answer:"rua~number_2.png"}, {DivList:["divActMainImage_3"], Answer:"tolu~number_3.png"}];
							rListIndex = Math.floor(Math.random() * rArrActList.length);
						}
					} else {
					if (rDispType=="RND") {
						rListIndex = Math.floor(Math.random() * rArrActList.length);
					} }
					doSetUpActAndShow();
				}
			}
			
			function doSetUpActAndShow() {
				var rAnswer = "";

				for (var i=1; i<=3; i++) {
					document.getElementById("divActMainImage_" + i).style.display = "none";
				}

				for (var i=0; i<rArrActList[rListIndex].DivList.length; i++) {
					document.getElementById(rArrActList[rListIndex].DivList[i]).style.display = "block";
				}				
				
				rAnswer = rArrActList[rListIndex].Answer;
				document.getElementById("divAnswer").getElementsByTagName("div")[0].innerHTML = rAnswer.split("~")[0];
				if (rAnswer.split("~")[1].toLowerCase()=="number_1.png") {
					document.getElementById("divAnswer").getElementsByTagName("img")[0].width="40";
				} else {
					document.getElementById("divAnswer").getElementsByTagName("img")[0].width="40";
				}
				document.getElementById("divAnswer").getElementsByTagName("img")[0].src = "images/" + rAnswer.split("~")[1];		
				
				//document.getElementById("imgQuestionMark").src = "../../images/question_mark_small.gif?ID=" + Math.random();
				document.getElementById("divQuestionMark").style.display = "block";
				document.getElementById("divAnswerAndNextArrowSmall").style.display = "none";
				
				if (rDispType=="SEQ") {
					if (rListIndex<=0) {
						document.getElementById("divBottomBtnPanel").style.display = "none";
					} else {
						document.getElementById("divBottomBtnPanel").style.display = "block";
					}
				} else {
					document.getElementById("divBottomBtnPanel").style.display = "block";
				}
			}
			
			function doShowAnswer(rObj) {
				if (rObj.style.cursor=="pointer") {
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divAnswerAndNextArrowSmall").style.display = "block";				
				}
			}

			function doReplay(rObj) {
				if (rObj.style.cursor=="pointer") {
					doResetAct();
				}
			}
		</script>

									</div>
								</div>								
							</div>
							
							<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red;">
