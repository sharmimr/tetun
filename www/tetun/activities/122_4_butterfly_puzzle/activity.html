    <script language="javascript">
      var rArrPicList = [
        ["2.png", "1.png", "3.png", "4.png"],
        ["4.png", "1.png", "2.png", "3.png"],
        ["2.png", "3.png", "4.png", "1.png"],
        ["3.png", "4.png", "1.png", "2.png"],
        ["1.png", "3.png", "2.png", "4.png"],
        ["3.png", "4.png", "1.png", "2.png"],
        ["3.png", "4.png", "2.png", "1.png"],
        ["4.png", "1.png", "3.png", "2.png"],
        ["2.png", "1.png", "4.png", "3.png"],
        ["1.png", "2.png", "4.png", "3.png"],
      ];

      function doGetRndPicList() {
        document.getElementById("divQuestionMark").style.display = "block";
        document.getElementById("divCorrectTextPanel").style.display = "none";
        document.getElementById("divReplayBtnPanel").style.display = "block";
        document.getElementById("divPicDisable").style.display = "none";

        for (var i = 1; i <= 4; i++) {
          var rInnerHTML =
            '<img id="imgPigPic_' +
            i +
            '" name="imgPigPic_' +
            i +
            '" class="clsPic" style="position:absolute; left:5px; bottom:13px;" />';
          document.getElementById("divPigPic_" + i).innerHTML = rInnerHTML;
        }
        var rRndId = Math.floor(Math.random() * rArrPicList.length);
        for (var i = 0; i < rArrPicList[rRndId].length; i++) {
          document.getElementById("imgPigPic_" + (i + 1)).src =
            "images/" + rArrPicList[rRndId][i];
        }
      }

      function doCheckAllDropCorrect() {
        var rArrDropImgList = [];
        for (var i = 1; i <= 4; i++) {
          var rImgSrc = document
            .getElementById("divPigPicMain_" + i)
            .getElementsByTagName("div")[0]
            .getElementsByTagName("img")[0].src;
          var rImgSrcSPL = rImgSrc.split("/");
          var rPicName = rImgSrcSPL[rImgSrcSPL.length - 1];
          rArrDropImgList.push(rPicName);
        }
        if (
          rArrDropImgList[0] == "1.png" &&
          rArrDropImgList[1] == "2.png" &&
          rArrDropImgList[2] == "3.png" &&
          rArrDropImgList[3] == "4.png"
        ) {
          document.getElementById("divQuestionMark").style.display = "none";
          document.getElementById("divCorrectTextPanel").style.display =
            "block";
          document.getElementById("divReplayBtnPanel").style.display = "block";
          document.getElementById("divPicDisable").style.display = "block";
        }
      }
    </script>

    <script language="javascript">
      $(".clsBox").draggable({
        axis: "x",
        containment: "#divImgCol",
        revert: true,
        drag: function (event, ui) {
          for (var i = 1; i <= 4; i++) {
            document.getElementById("divPigPicMain_" + i).style.zIndex = "auto";
          }
          document.getElementById(this.id).style.zIndex = 9998;
        },
      });

      $(".clsBox").droppable({
        drop: function (event, ui) {
          var rDragName = "";
          var rDropName = "";
          rDragName = ui.draggable.attr("id");
          rDropName = this.id;
          if (rDropName != "") {
            var rOldDropInnerHTML =
              document.getElementById(rDropName).innerHTML;
            document.getElementById(rDropName).innerHTML =
              document.getElementById(rDragName).innerHTML;
            document.getElementById(rDragName).innerHTML = rOldDropInnerHTML;
            document.getElementById(rDropName).style.zIndex = "1001";
            document.getElementById(rDragName).style.zIndex = "1002";
          }
          doCheckAllDropCorrect();
        },
      });
    </script>
