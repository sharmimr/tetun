		<script language="javascript">
			var rArrActSlideList = ["divActMain_1", "divActMain_2", "divActMain_3", "divActMain_4"];
			var rDisplayMode = "SEQ";
			var rActSlideIndex = 0;
			
			function doSetAndShowActivity() {
				if (rDisplayMode=="SEQ") {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "block";
					document.getElementById("divBtnNext").style.display = "none";				
				}
				
				if (rDisplayMode=="SEQ") {
					for (var i=0; i<rArrActSlideList.length; i++) {
						document.getElementById(rArrActSlideList[i]).style.display = "none";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[0].style.display = "block";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[1].style.display = "none";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[2].style.display = "none";
					}
				} else {
					for (var i=0; i<rArrActSlideList.length; i++) {
						document.getElementById(rArrActSlideList[i]).style.display = "block";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[0].style.display = "block";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[1].style.display = "none";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[2].style.display = "block";
					}					
				}
				
				document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[0].style.display = "block";
				document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[1].style.display = "block";
				document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[2].style.display = "none";
				document.getElementById(rArrActSlideList[rActSlideIndex]).style.display = "block";				
			}
			
			function doGetNextSlide(rObj) {
				try {
					for (var i=0; i<rArrActSlideList.length; i++) {
						document.getElementById(rArrActSlideList[i]).style.display = "none";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[0].style.display = "block";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[1].style.display = "none";
						document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[2].style.display = "none";
					}
					
					if (rDisplayMode=="SEQ") {
						rActSlideIndex++;
						if (rActSlideIndex>=rArrActSlideList.length) {
							document.getElementById("divBtnReplay").style.display = "inline-block";
							document.getElementById("divBtnNext").style.display = "inline-block";
						}
					} else {
						rActSlideIndex = Math.floor(Math.random() * rArrActSlideList.length);
					}

					if (rDisplayMode=="SEQ") {
						for (var i=0; i<=rActSlideIndex; i++) {
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[0].style.display = "block";
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[1].style.display = "none";
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[2].style.display = "block";
							document.getElementById(rArrActSlideList[i]).style.display = "block";
						}
						
						document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[0].style.display = "block";
						document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[1].style.display = "block";
						document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[2].style.display = "none";					
					} else {
						for (var i=0; i<rArrActSlideList.length; i++) {
							document.getElementById(rArrActSlideList[i]).style.display = "block";
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[0].style.display = "block";
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[1].style.display = "none";
							document.getElementById(rArrActSlideList[i]).getElementsByTagName("div")[2].style.display = "block";
						}
					}
					
					document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[0].style.display = "block";
					document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[1].style.display = "block";
					document.getElementById(rArrActSlideList[rActSlideIndex]).getElementsByTagName("div")[2].style.display = "none";
					document.getElementById(rArrActSlideList[rActSlideIndex]).style.display = "block";					
				} catch(err) {
					//alert(err.message);
				}
			}

			function doReplay() {
				rDisplayMode = "SEQ";
				rActSlideIndex = 0;
				doSetAndShowActivity();
			}
			
			function doGoToRNDOrder() {
				rDisplayMode = "RND";
				rActSlideIndex = Math.floor(Math.random() * rArrActSlideList.length);
				doSetAndShowActivity();
			}
		</script>
