    <script language="javascript">
      function doInit() {
        document.getElementById("divBtnPanel").style.display = "none";
        document.getElementById("divRightMarkPanel").style.display = "none";
        document.getElementById("divTimerPanel").style.display = "none";
        document.getElementById("divDemoPanel").style.display = "block";

        for (var i = 1; i <= 6; i++) {
          var rTempDragParent = document.getElementById("divDrag_" + i);
          rTempDragParent.getElementsByTagName("img")[0].src =
            "images/image_drag_" + i + ".png";

          var rTempDropParent = document.getElementById("divDrop_" + i);
          rTempDropParent.getElementsByTagName("img")[0].src =
            "images/image_drop_" + i + ".png";

          rTempDragParent.style.display = "block";
          rTempDropParent.style.display = "block";
        }

        document.getElementById("divDrag_1").style.display = "none";
        clearInterval(rObjectMovingTimer);
        rObjectMovingTimer = 0;
        rObjectMovingTimer = setInterval(doMoveObject, 1);
      }

      function doGetActivity() {
        rTimerStart = true;
        document.getElementById("divActTimer").innerHTML = "0";
        document.getElementById("divTimerPanel").style.display = "none";

        document.getElementById("divDemoPanel").style.display = "none";
        document.getElementById("divBtnPanel").style.display = "none";
        document.getElementById("divRightMarkPanel").style.display = "none";

        for (var i = 1; i <= 6; i++) {
          var rTempDragParent = document.getElementById("divDrag_" + i);
          rTempDragParent.getElementsByTagName("img")[0].src =
            "images/image_drag_" + i + ".png";

          var rTempDropParent = document.getElementById("divDrop_" + i);
          rTempDropParent.getElementsByTagName("img")[0].src =
            "images/image_drop_" + i + ".png";

          rTempDragParent.style.display = "block";
          rTempDropParent.style.display = "block";
        }
      }

      function doCheckAllDropCorrect() {
        var rCorrect = true;

        for (var i = 1; i <= 6; i++) {
          var rTempDragParent = document.getElementById("divDrag_" + i);
          var rTempDropParent = document.getElementById("divDrop_" + i);
          if (
            rTempDragParent.getElementsByTagName("img")[0].src !=
            rTempDropParent.getElementsByTagName("img")[0].src
          ) {
            rCorrect = false;
          }
        }

        if (rCorrect) {
          document.getElementById("divDemoPanel").style.display = "none";
          document.getElementById("divRightMarkPanel").style.display = "block";
          document.getElementById("divBtnPanel").style.display = "block";
          document.getElementById("divTimerPanel").style.display = "block";

          clearInterval(rCountingTimer);
          rCountingTimer = 0;
        }
      }
    </script>

    <script language="javascript">
      var rTimerStart = true;

      $(".clsBoxDrag").draggable({
        axis: "x, y",
        containment: "#divMainPanel",
        revert: true,
        drag: function (event, ui) {
          for (var i = 1; i <= 6; i++) {
            document.getElementById("divDrag_" + i).style.zIndex = "auto";
          }
          document.getElementById(this.id).style.zIndex = 9998;

          if (rTimerStart) {
            document.getElementById("divActTimer").innerHTML = "0";
            document.getElementById("divTimerPanel").style.display = "block";
            clearInterval(rCountingTimer);
            rCountingTimer = 0;
            rCountingTimer = setInterval(doCount, 1000);
            rTimerStart = false;
          }
        },
      });

      $(".clsBoxDrop").droppable({
        drop: function (event, ui) {
          var rDragName = "";
          var rDropName = "";
          rDragName = ui.draggable.attr("id");
          rDropName = this.id;
          if (rDropName != "") {
            if (
              Number(rDragName.split("_")[1]) == Number(rDropName.split("_")[1])
            ) {
              document
                .getElementById(rDropName)
                .getElementsByTagName("img")[0].src = document
                .getElementById(rDragName)
                .getElementsByTagName("img")[0].src;
              document.getElementById(rDragName).style.display = "none";
            }
          }
          doCheckAllDropCorrect();
        },
      });
    </script>

    <script language="javascript">
      var rObjectMovingTimer = 0;
      var rMoveElem = document.getElementById("divDemoDrag_1");
      var rElmLeft = 50;
      var rElmTop = 50;

      var rCountingTimer = 0;

      function doMoveObject() {
        if (rElmLeft == 383) {
          clearInterval(rObjectMovingTimer);
          rObjectMovingTimer = 0;
          window.setTimeout(function () {
            rMoveElem.style.left = "50px";
            doGetActivity();
          }, 500);
        } else {
          rElmLeft++;
          rMoveElem.style.left = rElmLeft + "px";
        }
      }

      function doCount() {
        document.getElementById("divActTimer").innerHTML =
          Number(document.getElementById("divActTimer").innerHTML) + 1;
      }

      doInit();
      doResetMainNavButton();
    </script>
