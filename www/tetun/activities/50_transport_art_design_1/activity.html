    <script language="javascript">
      var rArrDivList = ["div_Title", "div_1", "div_2", "div_3", "div_4"];
      var rListIndex = 0;
      var rPickedColor = "default";
      
      // Tracking variables
      var rObjectCompletionStatus = [false, false, false, false]; // Track completion for 4 objects
      var rObjectAttemptedStatus = [false, false, false, false]; // Track if object has any color
      var rTotalObjects = 4;
      var rObjectColors = {}; // Store colors for each object part

      function doNavigateAct(rAction) {
        // Save current object state before navigating away
        if (rListIndex > 0) {
          saveCurrentObjectState();
        }

        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }

        if (rAction.toUpperCase() == "N") {
          rListIndex++;
        } else {
          rListIndex--;
        }

        if (rListIndex <= 0) rListIndex = 0;
        if (rListIndex >= rArrDivList.length - 1)
          rListIndex = rArrDivList.length - 1;

        if (rListIndex <= 0) {
          document.getElementById("divQuestionMark").style.display = "block";
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else if (rListIndex >= rArrDivList.length - 1) {
          document.getElementById("divBtnReplay").style.display =
            "inline-block";
          document.getElementById("divBtnBack").style.display = "inline-block";
          document.getElementById("divBtnNext").style.display = "none";
        } else {
          document.getElementById("divBtnReplay").style.display =
            "inline-block";
          document.getElementById("divBtnBack").style.display = "inline-block";
          document.getElementById("divBtnNext").style.display = "inline-block";
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";

        // Load saved colors for the new object
        if (rListIndex > 0) {
          loadObjectState(rListIndex);
          
          // Update completion status display
          updateCompletionDisplay();
        } else {
          // Title page
          document.getElementById("divCorrectTextPanel").style.display = "none";
          document.getElementById("divQuestionMark").style.display = "block";
        }

        // Only reset color panel, not object colors
        doResetColorPanel();
        
        // Display current tracking status in console (for debugging)
        displayTrackingStatus();
      }

      // Save current object state
      function saveCurrentObjectState() {
        if (rListIndex <= 0) return; // Don't save title page
        
        var currentDiv = document.getElementById(rArrDivList[rListIndex]);
        var images = currentDiv.getElementsByTagName("img");
        var objectIndex = rListIndex - 1;
        
        // Create storage for this object if it doesn't exist
        if (!rObjectColors[objectIndex]) {
          rObjectColors[objectIndex] = {};
        }
        
        var hasAnyColor = false;
        
        // Save colors for each part
        for (var i = 0; i < images.length; i++) {
          if (images[i].getAttribute("name") == "imgObjectPart") {
            var rImageId = images[i].id;
            var rImageSrc = images[i].src;
            
            // Extract color from src path
            var colorMatch = rImageSrc.match(/\/([^\/]+)\/\d+\.png$/);
            if (colorMatch && colorMatch[1] !== 'default') {
              rObjectColors[objectIndex][rImageId] = colorMatch[1];
              hasAnyColor = true;
            } else {
              rObjectColors[objectIndex][rImageId] = 'default';
            }
          }
        }
        
        // Update attempted status
        rObjectAttemptedStatus[objectIndex] = hasAnyColor;
        
        // Update completion status
        checkCurrentObjectCompletion();
      }

      // Load object state
      function loadObjectState(index) {
        if (index <= 0) return; // Don't load for title page
        
        var currentDiv = document.getElementById(rArrDivList[index]);
        var images = currentDiv.getElementsByTagName("img");
        var objectIndex = index - 1;
        
        // Load colors for each part
        for (var i = 0; i < images.length; i++) {
          if (images[i].getAttribute("name") == "imgObjectPart") {
            var rImageId = images[i].id;
            var rTempSpl = rImageId.split("_");
            
            var rImageNum = rTempSpl[0].substring(5);
            var rObjectName = rTempSpl[1];
            
            // Check if we have a saved color for this part
            var savedColor = 'default';
            if (rObjectColors[objectIndex] && rObjectColors[objectIndex][rImageId]) {
              savedColor = rObjectColors[objectIndex][rImageId];
            }
            
            var rImageSrc = "images/" + rObjectName + "/" + savedColor + "/" + rImageNum + ".png";
            images[i].src = rImageSrc;
          }
        }
      }

      function doPickColor(rObj, rColor) {
        if (rObj.style.cursor == "pointer") {
          doResetColorPanel();
          rObj.style.border = "5px solid black";
          rObj.style.cursor = "default";
          rPickedColor = rColor;
        }
      }

      function doFillColor(rObj) {
        if (rObj.style.cursor == "pointer" && rPickedColor != "default") {
          var rImgElm = rObj.getElementsByTagName("img")[0];
          var rImageId = rImgElm.id;
          var rTempSpl = rImageId.split("_");

          var rImageNum = rTempSpl[0].substring(5);
          var rObjectName = rTempSpl[1];

          var rImageSrc =
            "images/" +
            rObjectName +
            "/" +
            rPickedColor +
            "/" +
            rImageNum +
            ".png";

          rImgElm.src = rImageSrc;
          
          // Save the color immediately
          if (rListIndex > 0) {
            var objectIndex = rListIndex - 1;
            if (!rObjectColors[objectIndex]) {
              rObjectColors[objectIndex] = {};
            }
            rObjectColors[objectIndex][rImageId] = rPickedColor;
            
            // Mark as attempted
            rObjectAttemptedStatus[objectIndex] = true;
          }

          doResetColorPanel();
          checkCurrentObjectCompletion();
        }
      }

      function checkCurrentObjectCompletion() {
        if (rListIndex <= 0) return false;
        
        var currentDiv = document.getElementById(rArrDivList[rListIndex]);
        var images = currentDiv.getElementsByTagName("img");
        var currentObjectIndex = rListIndex - 1;

        var isCurrentObjectComplete = true;
        var hasAnyColor = false;
        
        for (var i = 0; i < images.length; i++) {
          if (images[i].getAttribute("name") == "imgObjectPart") {
            var rImageSrc = images[i].src;

            if (rImageSrc.includes("/default/")) {
              isCurrentObjectComplete = false;
            } else {
              hasAnyColor = true;
            }
          }
        }

        // Update completion and attempted status for current object
        rObjectCompletionStatus[currentObjectIndex] = isCurrentObjectComplete;
        rObjectAttemptedStatus[currentObjectIndex] = hasAnyColor;

        // Update display
        updateCompletionDisplay();

        return isCurrentObjectComplete;
      }

      // New function to handle completion display
      function updateCompletionDisplay() {
        var allComplete = checkAllObjectsComplete();
        var completionMessage = document.getElementById("divCorrectTextPanel").querySelector('.clsPageText');
        
        if (rListIndex > 0) {
          var currentObjectIndex = rListIndex - 1;
          
          if (rObjectCompletionStatus[currentObjectIndex]) {
            // Current object is complete
            document.getElementById("divQuestionMark").style.display = "none";
            document.getElementById("divCorrectTextPanel").style.display = "block";

            if (allComplete) {
              completionMessage.innerHTML = "loos";
            } else {
              completionMessage.innerHTML = "";
            }
          } else {
            // Current object is not complete
            document.getElementById("divQuestionMark").style.display = "block";
            document.getElementById("divCorrectTextPanel").style.display = "none";
          }
        } else {
          // Title page
          document.getElementById("divQuestionMark").style.display = "block";
          document.getElementById("divCorrectTextPanel").style.display = "none";
        }
      }

      function checkAllObjectsComplete() {
        var allComplete = true;
        
        for (var i = 0; i < rTotalObjects; i++) {
          if (!rObjectCompletionStatus[i]) {
            allComplete = false;
            break;
          }
        }

        return allComplete;
      }

      function displayTrackingStatus() {
        console.log("=== Tracking Status ===");
        console.log("Current Object: " + (rListIndex > 0 ? "Object " + rListIndex : "Title Page"));
        
        console.log("\nCompletion Status:");
        for (var i = 0; i < rTotalObjects; i++) {
          console.log("Object " + (i+1) + ": " + (rObjectCompletionStatus[i] ? "✓ COMPLETE" : "✗ Incomplete"));
        }
        
        console.log("\nAttempted Status:");
        for (var i = 0; i < rTotalObjects; i++) {
          console.log("Object " + (i+1) + ": " + (rObjectAttemptedStatus[i] ? "🎨 Attempted" : "⭕ Not attempted"));
        }
        
        var anyAttempted = false;
        for (var i = 0; i < rTotalObjects; i++) {
          if (rObjectAttemptedStatus[i]) {
            anyAttempted = true;
            break;
          }
        }
        
        var allComplete = checkAllObjectsComplete();
        
        console.log("\nOverall Status:");
        if (allComplete) {
          console.log("🏆 COMPLETED - All objects fully colored!");
        } else if (anyAttempted) {
          console.log("📝 ATTEMPTED - Some objects have colors");
        } else {
          console.log("⭕ NOT STARTED - No colors applied yet");
        }
        console.log("=====================");
      }

      function doResetColorPanel() {
        rPickedColor = "default";
        document.getElementById("divActColorPanel").style.display = "none";

        var rLen = document.getElementsByName("divActColor").length;

        for (var i = 0; i < rLen; i++) {
          document.getElementsByName("divActColor")[i].style.border =
            "2px solid white";
          document.getElementsByName("divActColor")[i].style.cursor = "pointer";
        }

        if (rListIndex > 0) {
          document.getElementById("divActColorPanel").style.display = "block";
        }
      }

      function doResetObjectPartsColor() {
        var currentDiv = document.getElementById(rArrDivList[rListIndex]);
        var images = currentDiv.getElementsByTagName("img");

        for (var i = 0; i < images.length; i++) {
          if (images[i].getAttribute("name") == "imgObjectPart") {
            var rImageId = images[i].id;
            var rTempSpl = rImageId.split("_");

            var rImageNum = rTempSpl[0].substring(5);
            var rObjectName = rTempSpl[1];

            var rImageSrc =
              "images/" + rObjectName + "/default/" + rImageNum + ".png";

            images[i].src = rImageSrc;
            
            // Update stored colors
            if (rListIndex > 0) {
              var objectIndex = rListIndex - 1;
              if (rObjectColors[objectIndex]) {
                rObjectColors[objectIndex][rImageId] = 'default';
              }
            }
          }
        }
        
        // Update completion and attempted status after reset
        if (rListIndex > 0) {
          var objectIndex = rListIndex - 1;
          rObjectCompletionStatus[objectIndex] = false;
          rObjectAttemptedStatus[objectIndex] = false;
          updateCompletionDisplay();
        }
      }

      function doResetActivity() {
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }

        rListIndex = 0;
        
        // Reset all tracking variables
        for (var i = 0; i < rTotalObjects; i++) {
          rObjectCompletionStatus[i] = false;
          rObjectAttemptedStatus[i] = false;
        }
        rObjectColors = {};

        document.getElementById("divBtnReplay").style.display = "none";
        document.getElementById("divCorrectTextPanel").style.display = "none";
        document.getElementById("divBtnBack").style.display = "none";
        document.getElementById("divBtnNext").style.display = "inline-block";

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";

        doResetObjectPartsColor();
        doResetColorPanel();
        
        // Reset completion message
        var completionMessage = document.getElementById("divCorrectTextPanel").querySelector('.clsPageText');
        if (completionMessage) {
          completionMessage.innerHTML = "loos";
        }
        
        console.log("Activity reset - All tracking cleared");
        displayTrackingStatus();
      }
    </script>
