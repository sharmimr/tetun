<!doctype html>
<html lang="en">
	<head>
		<title>Timor Home App</title>
		
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
		<link rel="shortcut icon" href="image/logo.jpg" />
		<link rel="apple-touch-icon" href="image/logo.jpg" />
		-->
		<link rel="stylesheet" type="text/css" href="../../css/jquery-ui.css" />
		<link rel="stylesheet" type="text/css" href="../../css/jqueryui-style.css" />
		<link rel="stylesheet" type="text/css" href="../../css/font_awesome.css" />
		<link rel="stylesheet" type="text/css" href="../../css/main.css" />
		
		<style>
		</style>		

		<script src="../../js/jquery-3.6.0.js"></script>
		<script src="../../js/jquery-ui.js"></script>
		<script type="text/javascript" src="../../js/main.js"></script>

		<script language="javascript">
			var rArrImageList = ["bicycle.png", "motor.png", "small_boat.png", "cora.png", "large_truck.png", "tuk.png", "bus.png", "microlet.png", "plane.png"];
			var rArrTextList = ["bisikleta", "motór", "bero", "kora-kora", "kamiaun", "tum tum", "bis", "microlet", "aviaun"];
			var rListIndex = 0;
			var rDispType = "SEQ";
			
			function doShowCorrectAnswer() {
				document.getElementById("divQuestionMark").style.display = "none";
				document.getElementById("divCorrectTextPanel").style.display = "block";
				
				if (rDispType=="SEQ") {
					if (rListIndex==0) {
						document.getElementById("divBtnBack").style.display = "none";
					} else {
						document.getElementById("divBtnBack").style.display = "inline-block";
					}
					if (rListIndex==rArrImageList.length-1) {
						document.getElementById("divBtnNext").style.display = "none";
					} else {
						document.getElementById("divBtnNext").style.display = "inline-block";
					}
					
					if (rListIndex>0 && rListIndex<rArrImageList.length-1) {
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "inline-block";
					}
					
					if (rListIndex>0) {
						document.getElementById("divBtnReplay").style.display = "inline-block";
					} else {
						document.getElementById("divBtnReplay").style.display = "none";
					}				
					
					if (rListIndex>=rArrImageList.length-1) {
						rDispType = "RND";
						rArrImageList = ["bicycle.png", "motor.png", "small_boat.png", "cora.png", "large_truck.png", "tuk.png", "bus.png", "microlet.png", "plane.png"];
						rArrTextList = ["bisikleta", "motór", "bero", "kora-kora", "kamiaun", "tum tum", "bis", "microlet", "aviaun"];
						rListIndex = Math.floor(Math.random() * rArrImageList.length);
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "inline-block";
						document.getElementById("divBtnReplay").style.display = "inline-block";
						
					}
				} else {
				if (rDispType=="RND") {
					rListIndex = Math.floor(Math.random() * rArrImageList.length);
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";
					document.getElementById("divBtnReplay").style.display = "inline-block";					
				} }				
			}
			
			function doNavigateAct(rAction) {
				if (rDispType=="SEQ") {
					if (rAction.toUpperCase()=="N") {
						rListIndex++;
					} else {
						rListIndex--;
					}
					
					if (rListIndex==0) {
						rListIndex = 0;
					}					
				} else {
				if (rDispType=="RND") {
					rListIndex = Math.floor(Math.random() * rArrImageList.length);
				} }
				
				doSetActivity();
			}			
			
			function doSetActivity() {
				document.getElementById("divQuestionImage").getElementsByTagName("img")[0].src = "images/" + rArrImageList[rListIndex];
				document.getElementById("divCorrectText").innerHTML = rArrTextList[rListIndex];
				document.getElementById("divQuestionMark").style.display = "block";
				document.getElementById("divCorrectTextPanel").style.display = "none";
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnNext").style.display = "none";
				if (rDispType=="RND") {
					rArrImageList.splice(rListIndex, 1);
					rArrTextList.splice(rListIndex, 1);
				}
				if (rArrImageList.length==0) {
					rArrImageList = ["bicycle.png", "motor.png", "small_boat.png", "cora.png", "large_truck.png", "tuk.png", "bus.png", "microlet.png", "plane.png"];
					rArrTextList = ["bisikleta", "motór", "bero", "kora-kora", "kamiaun", "tum tum", "bis", "microlet", "aviaun"];
				}
				
				document.getElementById("imgQuestionMark").src = "../../images/question_mark_big.gif?ID=" + Math.random();
			}
			
			function doResetActivity() {
				rListIndex = 0;
				rDispType = "SEQ";
				rArrImageList = ["bicycle.png", "motor.png", "small_boat.png", "cora.png", "large_truck.png", "tuk.png", "bus.png", "microlet.png", "plane.png"];
				rArrTextList = ["bisikleta", "motór", "bero", "kora-kora", "kamiaun", "tum tum", "bis", "microlet", "aviaun"];
				document.getElementById("divBtnReplay").style.display = "none";
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnNext").style.display = "none";
				doSetActivity();
			}
		</script>		
	</head>

	<body bgcolor="#000000">
		<div id="divWrapper" name="divWrapper" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid red;">
			<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
				<tr>
					<td width="100%" height="100%" align="center" valign="middle">
						<div id="divContainer" name="divContainer" style="position:relative; width:730px; height:310px; background-color:#ffffff; border:0px solid blue;">
							<div style="position:relative; width:100%; height:100%; left:0px; top:0px; background:transparent; border:0px solid green;">
								<!--
								<div style="position:relative; width:100%; height:auto; border:0px solid #333333;">
									<table width="100%" height="100%" cellspacing="5" cellpadding="5" border="0">
										<tr>
											<td align="left" valign="middle">
												<div style="font-size:25px;"></div>
											</td>
										</tr>
									</table>
								</div>
								-->
								<div style="position:absolute; width:100%; height:130px; left:0px; top:0px; border:0px solid #333333;">
									<div style="position:relative; width:100%; height:auto; top:0px; border:0px solid #666666;" onclick="javascript:doShowCorrectAnswer();">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div id="divQuestionMark" name="divQuestionMark" style="position:relative; width:50px; top:0px; cursor:pointer; display:block;">
														<div style="display:inline-block;"><img id="imgQuestionMark" width="100%" height="auto" src="../../images/question_mark_big.gif" /></div>
													</div>
													<div id="divCorrectTextPanel" name="divCorrectTextPanel" style="position:relative; top:0px; display:none;">
														<div id="divCorrectText" name="divCorrectText" style="position:relative; top:-5px; font-size:200%; display:inline-block;">
														</div>
													</div>
												</td>
											</tr>
										</table>									
									</div>
									<div style="position:absolute; width:100%; height:auto; top:82px; border:0px solid #666666; border:0px solid #ff0000;">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div id="divQuestionImage" name="divQuestionImage" style="display:inline-block;">
														<img width="auto" height="175" src="images/bicycle.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
								</div>
								<div id="divBtnPanel" name="divBtnPanel" style="position:relative; width:100%; height:auto; left:0px; top:250px; border:0px solid #333333; display:block;">
									<div id="divBtnBack" name="divBtnBack" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doNavigateAct('P');">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img width="auto" height="40" src="../../images/back_arrow.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
									<div style="position:relative; width:0px; display:inline-block;"></div>
									<div id="divBtnReplay" name="divBtnReplay" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doResetActivity();">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img width="auto" height="40" src="../../images/replay.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
									<div style="position:relative; width:0px; display:inline-block;"></div>								
									<div id="divBtnNext" name="divBtnNext" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doNavigateAct('N');">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img width="auto" height="40" src="../../images/next_arrow.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>									
								</div>								
							</div>

							<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red;">
								<div id="divPosterImage" name="divPosterImage" class="clsMacroPosterImage" style="cursor:pointer;">
									<img id="imgPoster" name="imgPoster" width="100%" height="100%" />
								</div>							
								<div id="divBtnBackArrow" name="divBtnBackArrow" class="clsMacroBack" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'P');">
									<img width="100%" height="100%" src="../../images/back_arrow.png" />
								</div>
								<div id="divBtnNextArrow" name="divBtnNextArrow" class="clsMacroNext" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'N');">
									<img width="100%" height="100%" src="../../images/next_arrow.png" />
								</div>					
								<div id="divBtnHome" name="divBtnHome" class="clsMacroHome" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'H');">
									<img width="100%" height="100%" src="../../images/home.png" />
								</div>
							</div>
						</div>
					</td>
				</tr>
			</table>
		</div>
		<script language="javascript">
			doResetActivity();
			doResetMainNavButton();
		</script>
	</body>
</html>
