			var rArrDivList = ["div_Title", "div_1", "div_2", "div_3", "div_4"];
			var rListIndex = 0;
			var rPickedColor = "default";
			function doNavigateAct(rAction) {
			
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrDivList.length-1) {
					rListIndex = rArrDivList.length-1;
				}
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
				
				doResetObjectPartsColor();
				doResetColorPanel();				
			}
			
			function doPickColor(rObj, rColor) {
				if (rObj.style.cursor=="pointer") {
					doResetColorPanel();
					
					rObj.style.border = "5px solid black";
					rObj.style.cursor = "default";
					rPickedColor = rColor;
				}
			}
			
			function doFillColor(rObj) {
				if (rObj.style.cursor=="pointer") {
					var rImgElm = rObj.getElementsByTagName("img")[0];
					var rImageId = rImgElm.id;
					var rTempSpl = rImageId.split("_");
					var rImageNum = rTempSpl[0].substring(5, rTempSpl[0].length);
					var rImageSrc = "images/" + rTempSpl[1] + "/" + rPickedColor + "/" + rImageNum + ".png";
					rImgElm.src = rImageSrc;
					
					doResetColorPanel();
				}
			}			
			
			function doResetColorPanel() {
				rPickedColor = "default";
				document.getElementById("divActColorPanel").style.display = "none";
				var rLen = document.getElementsByName("divActColor").length;
				for (var i=0; i<rLen; i++) {
					document.getElementsByName("divActColor")[i].style.border = "5px solid white";
					document.getElementsByName("divActColor")[i].style.cursor = "pointer";
				}
				if (rListIndex>0) {
					document.getElementById("divActColorPanel").style.display = "block";
				}				
			}
			
			function doResetObjectPartsColor() {
				var rLen = document.getElementsByName("imgObjectPart").length;
				var rImageId = "";
				var rTempSpl = [];
				var rImageSrc = "";
				var rImageNum = "";
				for (var i=0; i<rLen; i++) {
					rImageId = document.getElementsByName("imgObjectPart")[i].id;
					rTempSpl = rImageId.split("_");
					rImageNum = rTempSpl[0].substring(5, rTempSpl[0].length);
					rImageSrc = "images/" + rTempSpl[1] + "/" + rPickedColor + "/" + rImageNum + ".png";
					document.getElementsByName("imgObjectPart")[i].src = rImageSrc;
				}
			}

			function doResetActivity() {

				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";

				doResetObjectPartsColor();
				doResetColorPanel();				
			}
		</script>
