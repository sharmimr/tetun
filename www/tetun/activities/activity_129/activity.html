		<script language="javascript">
			var rDot_1_Down = false;
			var rDot_2_Down = false;
			var rDot_3_Down = false;
			var rDot_4_Down = false;
			
			var rTopLine_1_Shown = false;
			var rTopLine_2_Shown = false;
			var rTopLine_3_Shown = false;
			var rTopLine_4_Shown = false;
			
			var rClickedShapeSmall="divSmallImage_1";
			//var rClickedShape = "";
			function doDotTouchStart(rObj) {
				rDot_1_Down = false;
				rDot_2_Down = false;
				rDot_3_Down = false;
				rDot_4_Down = false;
				switch (rObj.id) {
					case "divDot_1_1_Drag":
						rDot_1_Down = true;
						break;
					case "divDot_1_2_Drag":
						rDot_2_Down = true;
						break;
					case "divDot_1_3_Drag":
						rDot_3_Down = true;
						break;
					case "divDot_1_4_Drag":
						rDot_4_Down = true;
						break;

					case "divDot_2_1_Drag":
						rDot_1_Down = true;
						break;
					case "divDot_2_2_Drag":
						rDot_2_Down = true;
						break;
					case "divDot_2_3_Drag":
						rDot_3_Down = true;
						break;

					case "divDot_3_1_Drag":
						rDot_1_Down = true;
						break;
					case "divDot_3_2_Drag":
						rDot_2_Down = true;
						break;
					case "divDot_3_3_Drag":
						rDot_3_Down = true;
						break;
					case "divDot_3_4_Drag":
						rDot_4_Down = true;
						break;						
					default:
						break;
						
				}

				var rId = rObj.id.split("_")[1];

				for (var i=0; i<document.getElementsByName("divTickMark").length; i++) {
					document.getElementsByName("divBigImageMain")[i].style.display = "none";
					document.getElementsByName("divTickMark")[i].style.display = "none";
				}
				document.getElementById("divBigImageMain_" + rId).style.display = "block";
				document.getElementById("divTickMark_" + rId).style.display = "block";
				
				rClickedShape = rObj.id;
			}
			
			function doSmallImageTouchStart(rObj) {
				rClickedShapeSmall = rObj.id;
				if (rClickedShapeSmall=="divSmallImage_1" || rClickedShapeSmall=="divSmallImage_2" || rClickedShapeSmall=="divSmallImage_3") {
					doResetActivity();
				}
			}			
			
			var canvas = document.getElementById("divcanvas_1").getElementsByTagName("canvas")[0];

			canvas.width = 600;
			canvas.height = 175;	

			var ctx = canvas.getContext('2d');
			
			var touch = {
				isPressed: false,
				down: null,
				current: null,
				up: null,
				setDown: function(event, element) {
					this.isPressed = true;
					this.down = this.getPosition(event, element)
				},
				setUp: function(event, element) {
					this.isPressed = false;
					this.up = this.getPosition(event, element)
				},
				setCurrent: function(event, element) {
					this.current = this.getPosition(event, element)
				},
				getPosition: function(event, element) {
					var position = {
						x: event.touches[0].pageX - element.offsetLeft,
						y: event.touches[0].pageY - element.offsetTop
					}
					return position;
				}
			}			

			var lines = [];

			function draw() {
				if (rDot_1_Down || rDot_2_Down || rDot_3_Down || rDot_4_Down) {
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					lines.forEach(function(line) {
						drawLine(ctx, line);
					})
				}
			}
			
			function drawLine(ctx, line) {
				var {
					start,
					end,
					lineWidth = 10,
					lineCap = 'round', 
					strokeStyle = '#000000',
				} = line;

				if(!start || !end) {
					throw new Error('Start or end of line not defined.');
				}
			  
				ctx.beginPath();
				
				if (rDot_1_Down) {
					ctx.moveTo(start.x-15, start.y);
					ctx.lineTo(end.x-15, end.y);
				} else {
				if (rDot_2_Down) {
					ctx.moveTo(start.x-15, start.y);
					ctx.lineTo(end.x-15, end.y);
				} else {
				if (rDot_3_Down) {
					ctx.moveTo(start.x-15, start.y);
					ctx.lineTo(end.x-15, end.y);
				} else {
				if (rDot_4_Down) {
					ctx.moveTo(start.x-15, start.y);

			function doOverlapCheck(a, b) {
				var rect1 = a.getBoundingClientRect();
				var rect2 = b.getBoundingClientRect();
				var isInHoriztonalBounds = rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x;
				var isInVerticalBounds = rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
				var isOverlapping = isInHoriztonalBounds && isInVerticalBounds;
				return isOverlapping;
			}
