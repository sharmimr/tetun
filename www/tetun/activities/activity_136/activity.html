			function doCheckAllDropCorrect() {
				if (rAllCorrectCount>=4) {
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divCorrectTextPanel").style.display = "block";
					document.getElementById("divReplayBtnPanel").style.display = "block";
					document.getElementById("divPicDisable").style.display = "block";				
				}
			}
		</script>
		
		<script language="javascript">
			$(".clsBoxDrag").draggable({
				axis: "x,y", containment: "#divDragAndDropMain", revert: true,
				drag: function(event, ui) {
					//for (var i=1; i<=4; i++) {
						//document.getElementById("divDragMain_"+i).style.zIndex = "auto";
					//}
					//document.getElementById(this.id).style.zIndex = 9998;
				}
			});
			
			$(".clsBoxDrop").droppable({
				drop: function(event, ui) {
					var rDragName = "";
					var rDropName = "";
					rDragName = ui.draggable.attr("id");
					rDropName = this.id;
					
					var rImgSRC = document.getElementById(rDropName).getElementsByTagName("img")[0].src;
					var rImgSRCSpl = rImgSRC.split("/");
					var rImgName = rImgSRCSpl[rImgSRCSpl.length-1];
					var rDropImageName = "divDropMainImage_" + rDropName.split("_")[1];
					if (rDragName=="divDragMain_1" && rImgName=="drop_1.png") {
						document.getElementById(rDropName).style.display = "none";
						document.getElementById(rDragName).style.display = "none";
						document.getElementById(rDropImageName).getElementsByTagName("img")[0].src = document.getElementById(rDragName).getElementsByTagName("img")[0].src;
						document.getElementById(rDropImageName).style.display = "inline-block";
						rAllCorrectCount++;
					}
					if (rDragName=="divDragMain_2" && rImgName=="drop_2.png") {
						document.getElementById(rDropName).style.display = "none";
						document.getElementById(rDragName).style.display = "none";
						document.getElementById(rDropImageName).getElementsByTagName("img")[0].src = document.getElementById(rDragName).getElementsByTagName("img")[0].src;
						document.getElementById(rDropImageName).style.display = "inline-block";
						rAllCorrectCount++;
					}
					if (rDragName=="divDragMain_3" && rImgName=="drop_3.png") {
						document.getElementById(rDropName).style.display = "none";
						document.getElementById(rDragName).style.display = "none";
						document.getElementById(rDropImageName).getElementsByTagName("img")[0].src = document.getElementById(rDragName).getElementsByTagName("img")[0].src;
						document.getElementById(rDropImageName).style.display = "inline-block";
						rAllCorrectCount++;
					}
					if (rDragName=="divDragMain_4" && rImgName=="drop_4.png") {
						document.getElementById(rDropName).style.display = "none";
						document.getElementById(rDragName).style.display = "none";
						document.getElementById(rDropImageName).getElementsByTagName("img")[0].src = document.getElementById(rDragName).getElementsByTagName("img")[0].src;
						document.getElementById(rDropImageName).style.display = "inline-block";
						rAllCorrectCount++;
					}
					var rTempLeftSource = document.getElementById(rDropName).style.left;
					var rTempLeftSourceSpl = rTempLeftSource.split("px");
					var rTempLeft = Number(rTempLeftSourceSpl[0]);
					document.getElementById(rDropImageName).style.left = (rTempLeft + 65) + "px";
					doCheckAllDropCorrect();
				}
			});
