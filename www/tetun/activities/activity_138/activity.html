		<script language="javascript">
			function shuffle(array) {
				var i = array.length,
					j = 0,
					temp;

				while (i--) {

					j = Math.floor(Math.random() * (i+1));

					// swap randomly chosen element with current element
					temp = array[i];
					array[i] = array[j];
					array[j] = temp;

				}

				return array;
			}
			
			var rRndNums = shuffle([1,2,3,4,5,6,7,8]);
			var rArrIndex = 0;
			var rCorrectCount = 0;
		
			function doShowColorHint(rObj) {
				document.getElementById("divQuestionMark").style.display = "none";
				document.getElementById("divTextHint").getElementsByTagName("img")[0].src = "images/text_image_" + rRndNums[rArrIndex] + ".png";
				document.getElementById("divTextHint").style.display = "block";
			}
		
			function doResetActivity() {
				rRndNums = shuffle([1,2,3,4,5,6,7,8]);
				rArrIndex = 0;
				rCorrectCount = 0;
				document.getElementById("divCorrectTextPanel").style.display = "none";
				document.getElementById("divTextHint").style.display = "none";
				document.getElementById("divPicDisable").style.display = "none";
				var rLen = document.getElementsByName("divRightSideColorImage").length;
				for (var i=0; i<rLen; i++) {
					document.getElementsByName("divRightSideColorImage")[i].style.display = "none";
				}
				document.getElementById("divReplayBtnPanel").style.display = "block";
				document.getElementById("divQuestionMark").style.display = "block";
			}
			
			function doCheckCorrect(rObj) {
				var rTempSpl = rObj.id.split("_");
				var rTempElm = null;
				if (rTempSpl[1]==rRndNums[rArrIndex]) {
					rTempElm = document.getElementById("divRightSideColorImage_" + rRndNums[rArrIndex]);
					rTempElm.style.display = "block";
					document.getElementById("divTextHint").style.display = "none";
					document.getElementById("divQuestionMark").style.display = "block";
					rArrIndex++;
					rCorrectCount++;
				}
				
				if (rCorrectCount>=8) {
					document.getElementById("divPicDisable").style.display = "block";
					document.getElementById("divReplayBtnPanel").style.display = "block";
					document.getElementById("divQuestionMark").style.display = "none";
					document.getElementById("divCorrectTextPanel").style.display = "block";
				}
			}
		</script>
