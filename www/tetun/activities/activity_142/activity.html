      var drawings = {}; // stores drawing per number
      var rArrDivList = ["div_1"];
      var rListIndex = 0;
      var rArrImageList = [
        "1.png",
        "2.png",
        "3.png",
        "4.png",
        "5.png",
        "6.png",
        "7.png",
        "8.png",
        "9.png",
        "10.png",
      ];
      var rImageListIndex = 0;

      function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      getMousePos();

      function doNavigateAct(rAction) {
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }
        if (rAction.toUpperCase() == "N") {
          rListIndex++;
        } else {
          rListIndex--;
        }

        if (rListIndex <= 0) {
          rListIndex = 0;
        }

        if (rListIndex >= rArrDivList.length - 1) {
          rListIndex = rArrDivList.length - 1;
        }

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }

      function doNavigateImage(rAction) {
        const currentNumber = rImageListIndex + 1;

        // save current drawing
        drawings[currentNumber] = {
          clickX: [...clickX],
          clickY: [...clickY],
          clickDrag: [...clickDrag],
        };
        if (rAction.toUpperCase() == "N") {
          rImageListIndex++;
          const newNumber = rImageListIndex + 1;

          // reset current arrays
          clickX = [];
          clickY = [];
          clickDrag = [];

          // load saved drawing if exists
          if (drawings[newNumber]) {
            clickX = [...drawings[newNumber].clickX];
            clickY = [...drawings[newNumber].clickY];
            clickDrag = [...drawings[newNumber].clickDrag];
          }

          // redraw canvas
          context.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < clickX.length; i++) {
            context.beginPath();
            if (clickDrag[i] && i) {
              context.moveTo(clickX[i - 1], clickY[i - 1]);
            } else {
              context.moveTo(clickX[i] - 1, clickY[i]);
            }
            context.lineTo(clickX[i], clickY[i]);
            context.stroke();
            context.closePath();
          }
        } else {
          rImageListIndex--;
          const newNumber = rImageListIndex + 1;

          // reset current arrays
          clickX = [];
          clickY = [];
          clickDrag = [];

          // load saved drawing if exists
          if (drawings[newNumber]) {
            clickX = [...drawings[newNumber].clickX];
            clickY = [...drawings[newNumber].clickY];
            clickDrag = [...drawings[newNumber].clickDrag];
          }

          // redraw canvas
          context.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < clickX.length; i++) {
            context.beginPath();
            if (clickDrag[i] && i) {
              context.moveTo(clickX[i - 1], clickY[i - 1]);
            } else {
              context.moveTo(clickX[i] - 1, clickY[i]);
            }
            context.lineTo(clickX[i], clickY[i]);
            context.stroke();
            context.closePath();
          }
        }

        if (rImageListIndex <= 0) {
          rImageListIndex = 0;
        }

        if (rImageListIndex >= rArrImageList.length - 1) {
          rImageListIndex = rArrImageList.length - 1;
        }

        if (rImageListIndex <= 0) {
          document.getElementById("divBtnWBBack").style.display = "none";
          document.getElementById("divBtnWBNext").style.display =
            "inline-block";
        } else {
          if (rImageListIndex >= rArrImageList.length - 1) {
            document.getElementById("divBtnWBBack").style.display =
              "inline-block";
            document.getElementById("divBtnWBNext").style.display = "none";
            if (tick) {
              tick.style.display = "inline-block";
            }
          } else {
            document.getElementById("divBtnWBBack").style.display =
              "inline-block";
            document.getElementById("divBtnWBNext").style.display =
              "inline-block";
            if (tick) {
              tick.style.display = "none";
            }
          }
        }

        document
          .getElementById("divNumberImage")
          .getElementsByTagName("img")[0].src =
          "images/number/" + (rImageListIndex + 1) + ".png";
      }

      function doResetActivity() {
        doResetBoard();
        for (var i = 0; i < rArrDivList.length; i++) {

              "inline-block";
            document.getElementById("divBtnBack").style.display =

            document.getElementById("divBtnNext").style.display =

          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =

          rImageListIndex = 0;
        }

        if (rImageListIndex >= rArrImageList.length - 1) {

        if (rImageListIndex <= 0) {

          } else {

          }
        }

        document

      }

        // helper function
        function isNearPath(x, y, pathPoints) {
          const threshold = 70;

          for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i];
            const p2 = pathPoints[i + 1];

            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;

            const lengthSq = dx * dx + dy * dy;
            if (lengthSq === 0) continue;

            let t = ((x - p1.x) * dx + (y - p1.y) * dy) / lengthSq;
            t = Math.max(0, Math.min(1, t));

            const projX = p1.x + t * dx;
            const projY = p1.y + t * dy;

            const dist = Math.sqrt((x - projX) ** 2 + (y - projY) ** 2);

            if (dist < threshold) return true;
          }

          return false;
        }

         * @return {boolean} dragging
         */
        function addClick(x, y, dragging) {
          clickX.push(x);
          clickY.push(y);
          clickDrag.push(dragging);
        }

        function isNearPath(x, y, pathPoints) {
          const threshold = 80; // px tolerance
          return pathPoints.some((p) => {
            const dx = x - p.x;
            const dy = y - p.y;
            return Math.sqrt(dx * dx + dy * dy) < threshold;
          });
        }

        /**
         * Redraw the complete canvas.
         */
        function redraw() {
          // Clears the canvas
          context.clearRect(0, 0, context.canvas.width, context.canvas.height);
          context.strokeStyle = rSelectedColor;
          context.lineWidth = 10;
          for (var i = 0; i < clickX.length; i += 1) {
            if (!clickDrag[i] && i == 0) {
              context.beginPath();
              context.moveTo(clickX[i], clickY[i]);
              context.stroke();
            } else if (!clickDrag[i] && i > 0) {
              context.closePath();

              context.beginPath();
              context.moveTo(clickX[i], clickY[i]);
              context.stroke();
            } else {
              context.lineTo(clickX[i], clickY[i]);
              context.stroke();
            }
          }
        }

        /**
         * Draw the newly added point.
         * @return {void}
         */
        function drawNew() {
          context.strokeStyle = rSelectedColor;
          context.lineWidth = 10;
          var i = clickX.length - 1;
          if (!clickDrag[i]) {
            if (clickX.length == 0) {
              context.beginPath();
              context.moveTo(clickX[i], clickY[i]);
              context.stroke();
            } else {
              context.closePath();

              context.beginPath();
              context.moveTo(clickX[i], clickY[i]);
              context.stroke();
            }
          } else {
            context.lineTo(clickX[i], clickY[i]);
            context.stroke();
          }
        }

        function mouseDownEventHandler(e) {
          paint = true;

          const pos = getCanvasPos(e);

          addClick(pos.x, pos.y, false);
          drawNew();
        }

        function touchstartEventHandler(e) {
          paint = true;
          if (paint) {
            addClick(
              e.touches[0].pageX - canvas.offsetLeft,
              e.touches[0].pageY - canvas.offsetTop,
              false,
            );
            drawNew();
          }
        }

        function mouseUpEventHandler(e) {
          context.closePath();
          paint = false;
        }

        function mouseMoveEventHandler(e) {
          if (!paint) return;

          const pos = getCanvasPos(e);

          addClick(pos.x, pos.y, true);
          drawNew();
        }

        function touchMoveEventHandler(e) {
          const x = e.touches[0].pageX - canvas.offsetLeft;
          const y = e.touches[0].pageY - canvas.offsetTop;

          const currentNumber = rImageListIndex + 1;
          const currentPath = numberPaths[currentNumber];

          if (paint) {
            addClick(x, y, true);
            drawNew();
          }
        }

        function setUpHandler(isMouseandNotTouch, detectEvent) {
          removeRaceHandlers();
          if (isMouseandNotTouch) {
            canvas.addEventListener("mouseup", mouseUpEventHandler);
            canvas.addEventListener("mousemove", mouseMoveEventHandler);
            canvas.addEventListener("mousedown", mouseDownEventHandler);
            mouseDownEventHandler(detectEvent);
          } else {
            canvas.addEventListener("touchstart", touchstartEventHandler);
            canvas.addEventListener("touchmove", touchMoveEventHandler);
            canvas.addEventListener("touchend", mouseUpEventHandler);
            touchstartEventHandler(detectEvent);
          }
        }

        function mouseWins(e) {
          setUpHandler(true, e);
        }

        function touchWins(e) {
          setUpHandler(false, e);
        }

        function removeRaceHandlers() {
          canvas.removeEventListener("mousedown", mouseWins);
          canvas.removeEventListener("touchstart", touchWins);
        }

        canvas.addEventListener("mousedown", mouseWins);
        canvas.addEventListener("touchstart", touchWins);
      }

      function doSelectColor(rObj, rColor) {
        for (var i = 1; i <= 8; i++) {
          document.getElementById("divColor_" + i).style.cursor = "pointer";
          document.getElementById("divColor_" + i).style.border = "none";
        }
        if (rObj.style.cursor == "pointer") {
          rSelectedColor = rColor;
          rObj.style.cursor = "default";
          rObj.style.border = "2px solid #00ff00";
        }
      }

      document
        .getElementById("divEraserButton")
        .addEventListener("click", () => {
          //doResetActivity();
          context.clearRect(0, 0, myCanvas.width, myCanvas.height);
          shapes = [];
          //rSelectedColor = "#000000";
          setTimeout(function () {
            myCanvas.width = myCanvas.width;
            rLineWidth = 10;
            doResetBoard();
          }, 100);
        });
    </script>

          console.error("No auth token found in localStorage!");
          return;

          keepalive: true,
        })
