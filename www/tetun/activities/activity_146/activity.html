    <script language="javascript">
      var rArrDivList = ["div_1"];
      var rListIndex = 0;

      function doNavigateAct(rAction) {
        console.log("TEST");
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }
        if (rAction.toUpperCase() == "N") {
          console.log("TEST1");
          rListIndex++;
        } else {
          rListIndex--;
        }

        if (rListIndex <= 0) {
          rListIndex = 0;
        }

        if (rListIndex >= rArrDivList.length - 1) {
          rListIndex = rArrDivList.length - 1;
        }

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }

      function doResetActivity() {
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }

        rListIndex = 0;

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }

    <script language="javascript">
      doResetActivity();

      // myself
      let revealedCount = 0;
      function handleClick(num) {
        var image = document.getElementById("myImage");
        var audio = document.getElementById("myAudio");
        var mybg = document.getElementById("myWave");

        const clickableDivs = document.getElementsByClassName("clickable");
        clickableDivs[num - 1].style.display = "none";

        document.getElementById("show" + num).style.display = "block";
        revealedCount++;
        audio.play();
        // Feed back
        if (revealedCount === 4) {
          // document.getElementById('finalFeedback').style.display = 'block';
          image.src = "images/14.gif";
        }
        if (revealedCount === 8) {
          // document.getElementById('finalFeedback').style.display = 'block';
          image.src = "images/15.gif";
          mybg.play();
        }
      }
    </script>
