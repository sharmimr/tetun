				}

				/*
				rLen = document.getElementsByName("divImageNumber").length;
				for (var i=0; i<rLen; i++) {

				myTimeout_3 = setTimeout(

					document.getElementsByName("divImageNumber")[i].style.display = "none";
				}			
				document.getElementById("divQuestionMark").style.display = "none";
				document.getElementById("imgAnsNum").src = "images/ans_num_" + rCorrectDisplayNum + ".png";
				document.getElementById("divAnsNum").style.display = "block";
				document.getElementById("divNextArrowSmall").style.display = "block";
			}
			
			function fadeOut(elem, ms) {
				if	(! elem)
					return;

				if	(ms) {
					var opacity = 1;
					var timer = setInterval( function() {
						opacity -= 50 / ms;
						if	(opacity <= 0) {
							clearInterval(timer);
							opacity = 0;
							elem.style.display = "none";
							//elem.style.visibility = "hidden";
						}
						elem.style.opacity = opacity;
						elem.style.filter = "alpha(opacity=" + opacity * 100 + ")";
					}, 50 );
				} else {
					elem.style.opacity = 0;
					elem.style.filter = "alpha(opacity=0)";
					elem.style.display = "none";
					//elem.style.visibility = "hidden";
					
				}
			}
