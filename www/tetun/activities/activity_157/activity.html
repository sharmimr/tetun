    <script language="javascript">
      var rArrDivList = ["div_1", "div_2", "div_3", "div_4", "div_5"];
      var rListIndex = 0;

      function doNavigateAct(rAction) {
        document.getElementById("audSlide").pause();
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }
        if (rAction.toUpperCase() == "N") {
          rListIndex++;
        } else {
          rListIndex--;
        }

        if (rListIndex <= 0) {
          rListIndex = 0;
        }

        if (rListIndex >= rArrDivList.length - 1) {
          rListIndex = rArrDivList.length - 1;
        }

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";

        if (rListIndex > 0 && rListIndex < 4) {
          document.getElementById("audSlide").src = "media/audio/1.mp3";
          document.getElementById("audSlide").play();
        }
      }

      function doResetActivity() {
        document.getElementById("audSlide").pause();
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }

        rListIndex = 0;

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }
    </script>
  </head>

  <body bgcolor="#000000">

                <!--Slides End-->
                <!--Buttons Begin-->

                    >

                          </div>
                        </td>
                      </tr>

                  </div>
                  <div

                      position: relative;
                      width: 10px;
                      display: inline-block;
                    "
                  ></div>
                  <div
                    id="divBtnReplay"
                    name="divBtnReplay"
                    style="
                      position: relative;
                      border: 0px solid #666666;
                      cursor: pointer;
                      display: inline-block;
                    "
                    onclick="javascript: doResetActivity();"
                  >
                    <table

                      height="100%"

                      cellpadding="0"

                    >

                  <div

                      width: 10px;
                      display: inline-block;
                    "
                  ></div>
                  <div
                    id="divBtnNext"
                    name="divBtnNext"
                    style="
                      position: relative;
                      border: 0px solid #666666;
                      cursor: pointer;
                      display: inline-block;
                    "
                    onclick="javascript: doNavigateAct('N');"
                  >

                      height="100%"

                      cellpadding="0"
                      border="0"
                    >

                  onclick="javascript: doRedirectToURL(this, 'N');"
                >

                <div

                >
                  <img width="100%" height="100%" src="../../images/home.png" />
                </div>
              </div>
              <!--Buttons End-->
            </div>
          </td>
        </tr>

      <audio id="audSlide" src="media/audio/1.mp3"></audio>
