			function doNavigateAct(rAction) {
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrDivList.length-1) {
					rListIndex = rArrDivList.length-1;
				}
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}

		<script language="javascript">
			var canvas = document.getElementById('myCanvas');
			var context = document.getElementById('myCanvas').getContext("2d");
			var rSelectedColor = "#000000";
			context.strokeStyle = rSelectedColor;
			context.lineJoin = "round";
			context.lineWidth = 2;			
			
			function doResetBoard() {
				var clickX = [];
				var clickY = [];
				var clickDrag = [];
				var paint;

				/**
				 * Add information where the user clicked at.
				 * @param {number} x
				 * @param {number} y
				 * @return {boolean} dragging
				 */
				function addClick(x, y, dragging) {
					clickX.push(x-50);
					clickY.push(y-50);
					clickDrag.push(dragging);
				}

				/**
				 * Redraw the complete canvas.
				 */
				function redraw() {
					// Clears the canvas
					context.clearRect(0, 0, context.canvas.width, context.canvas.height);
					context.strokeStyle = rSelectedColor;
					context.lineWidth = 2;
					for (var i = 0; i < clickX.length; i += 1) {
						if (!clickDrag[i] && i == 0) {
							context.beginPath();
							context.moveTo(clickX[i], clickY[i]);
							context.stroke();
						} else if (!clickDrag[i] && i > 0) {
							context.closePath();

							context.beginPath();
							context.moveTo(clickX[i], clickY[i]);
							context.stroke();
						} else {
							context.lineTo(clickX[i], clickY[i]);
							context.stroke();
						}
					}
				}

				/**
				 * Draw the newly added point.
				 * @return {void}
				 */
				function drawNew() {
					context.strokeStyle = rSelectedColor;
					context.lineWidth = 2;
					var i = clickX.length - 1
					if (!clickDrag[i]) {
						if (clickX.length == 0) {
							context.beginPath();
							context.moveTo(clickX[i], clickY[i]);
							context.stroke();
						} else {
							context.closePath();

							context.beginPath();
							context.moveTo(clickX[i], clickY[i]);
							context.stroke();
						}
					} else {
						context.lineTo(clickX[i], clickY[i]);
						context.stroke();
					}
				}

				function mouseDownEventHandler(e) {
					paint = true;
					var x = e.pageX - canvas.offsetLeft;
					var y = e.pageY - canvas.offsetTop;
					if (paint) {
						addClick(x, y, false);
						drawNew();
					}
				}

				function touchstartEventHandler(e) {
					paint = true;
					if (paint) {
						addClick(e.touches[0].pageX - canvas.offsetLeft, e.touches[0].pageY - canvas.offsetTop, false);
						drawNew();
					}
				}

				function mouseUpEventHandler(e) {
					context.closePath();
					paint = false;
				}

				function mouseMoveEventHandler(e) {
					var x = e.pageX - canvas.offsetLeft;
					var y = e.pageY - canvas.offsetTop;
					if (paint) {
						addClick(x, y, true);
						drawNew();
					}
				}

				function touchMoveEventHandler(e) {
					if (paint) {
						addClick(e.touches[0].pageX - canvas.offsetLeft, e.touches[0].pageY - canvas.offsetTop, true);
						drawNew();
					}
				}

				function setUpHandler(isMouseandNotTouch, detectEvent) {
					removeRaceHandlers();
					if (isMouseandNotTouch) {
						canvas.addEventListener('mouseup', mouseUpEventHandler);
						canvas.addEventListener('mousemove', mouseMoveEventHandler);
						canvas.addEventListener('mousedown', mouseDownEventHandler);
						mouseDownEventHandler(detectEvent);
					} else {
						canvas.addEventListener('touchstart', touchstartEventHandler);
						canvas.addEventListener('touchmove', touchMoveEventHandler);
						canvas.addEventListener('touchend', mouseUpEventHandler);
						touchstartEventHandler(detectEvent);
					}
				}

				function mouseWins(e) {
					setUpHandler(true, e);
				}

				function touchWins(e) {
					setUpHandler(false, e);
				}

				function removeRaceHandlers() {
					canvas.removeEventListener('mousedown', mouseWins);
					canvas.removeEventListener('touchstart', touchWins);
				}

				canvas.addEventListener('mousedown', mouseWins);
				canvas.addEventListener('touchstart', touchWins);
			}
			
			function doSelectColor(rObj, rColor) {
				for (var i=1; i<=8; i++) {
					document.getElementById("divColor_"+i).style.cursor = "pointer";
					document.getElementById("divColor_"+i).style.border = "none";
				}
				if (rObj.style.cursor=="pointer") {
					rSelectedColor = rColor;
					rObj.style.cursor = "default";
					rObj.style.border = "2px solid #00ff00";
				}
			}
			
			document.getElementById('divEraserButton')
					.addEventListener('click', () => {
						//doResetActivity();
						context.clearRect(0, 0, myCanvas.width, myCanvas.height);
						shapes = [];
						//rSelectedColor = "#000000";
						setTimeout(function () {
							myCanvas.width = myCanvas.width;
							rLineWidth = 2;
							doResetBoard();
						}, 100);
			});		
		</script>
