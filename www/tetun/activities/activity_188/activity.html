			var rArrDivList = ["div_1", "div_2", "div_3", "div_4", "div_5", "div_6", "div_7", "div_8", "div_9"];
			var rArrSlide1DragListLetter = ["t", "a", "i", "s"];
			var rArrSlide2DragListLetter = ["l", "i", "l", "i", "n"];
			var rArrSlide3DragListLetter = ["r", "a", "i"];
			var rArrSlide4DragListLetter = ["s", "u", "r", "i", "k"];
			var rArrSlide5DragListLetter = ["s", "o", "r", "u"];
			var rArrSlide6DragListLetter = ["u", "m", "a"];
			var rArrSlide7DragListLetter = ["l", "a", "f", "a", "e", "k"];
			var rArrSlide8DragListLetter = ["d", "a", "n" , "s", "a"];
			var rListIndex = 0;
			
			// Track state across all slides
			var rAllSlidesState = {}; // Track all placed alphabets across all slides
			
			function doNavigateToSlide(rTempListIndex) {
				// Store current slide state before navigating
				if (rListIndex > 0) {
					storeCurrentSlideState(rListIndex);
				}
				rListIndex = rTempListIndex;
				doNavigateAct("No");
			}
			
			// Store current slide's state
			function storeCurrentSlideState(slideIndex) {
				if (slideIndex < 1 || slideIndex > 8) return;
				
				var slideConfig = {
					1: { prefix: "1", count: 4 },
					2: { prefix: "2", count: 5 },
					3: { prefix: "3", count: 3 },
					4: { prefix: "4", count: 5 },
					5: { prefix: "5", count: 4 },
					6: { prefix: "6", count: 3 },
					7: { prefix: "7", count: 6 },
					8: { prefix: "8", count: 5 }
				};
				
				var config = slideConfig[slideIndex];
				if (!config) return;
				
				if (!rAllSlidesState[slideIndex]) {
					rAllSlidesState[slideIndex] = {};
				}
				
				// Store which drag items are hidden (placed)
				for (var i = 1; i <= config.count; i++) {
					var dragId = "divDrag_" + config.prefix + "_" + i;
					var dragElement = document.getElementById(dragId);
					var dropId = "divDrop_" + config.prefix + "_" + i;
					var dropElement = document.getElementById(dropId);
					
					if (dragElement && dropElement) {
						rAllSlidesState[slideIndex][dragId] = {
							dragDisplay: dragElement.style.display,
							dropColor: dropElement.style.color,
							dragValue: dragElement.innerHTML
						};
					}
				}
			}
			
			// Restore slide's state when navigating back
			function restoreSlideState(slideIndex) {
				if (slideIndex < 1 || slideIndex > 8) return;
				
				var slideConfig = {
					1: { prefix: "1", count: 4 },
					2: { prefix: "2", count: 5 },
					3: { prefix: "3", count: 3 },
					4: { prefix: "4", count: 5 },
					5: { prefix: "5", count: 4 },
					6: { prefix: "6", count: 3 },
					7: { prefix: "7", count: 6 },
					8: { prefix: "8", count: 5 }
				};
				
				var config = slideConfig[slideIndex];
				if (!config) return;
				
				var slideState = rAllSlidesState[slideIndex];
				
				for (var i = 1; i <= config.count; i++) {
					var dragId = "divDrag_" + config.prefix + "_" + i;
					var dropId = "divDrop_" + config.prefix + "_" + i;
					var dragElement = document.getElementById(dragId);
					var dropElement = document.getElementById(dropId);
					
					if (dragElement && dropElement && slideState && slideState[dragId]) {
						// Restore saved state
						dragElement.style.display = slideState[dragId].dragDisplay;
						dropElement.style.color = slideState[dragId].dropColor;
					} else {
						// Default state if not saved
						dragElement.style.display = "block";
						dragElement.style.color = "#000000";
						dropElement.style.color = "lightgrey";
					}
				}
				
				// Check if current slide is complete to show/hide completion message
				checkCurrentSlideComplete(slideIndex, config.count);
			}
			
			// Check if current slide is complete
			function checkCurrentSlideComplete(slideIndex, count) {
				var prefix = slideIndex;
				var allComplete = true;
				
				for (var i = 1; i <= count; i++) {
					var dragElement = document.getElementById("divDrag_" + prefix + "_" + i);
					if (dragElement && dragElement.style.display != "none") {
						allComplete = false;
						break;
					}
				}
				
				if (allComplete) {
					document.getElementById("divDragAndDropAreaDisable").style.display = "block";
					document.getElementById("divCorrectTextPanel").style.display = "block";
				} else {
					document.getElementById("divDragAndDropAreaDisable").style.display = "none";
					document.getElementById("divCorrectTextPanel").style.display = "none";
				}
			}
			
			// Universal drop handler
			function createDropHandler(slideIndex, totalItems, prefix) {
				return function(event, ui) {
					var rDragName = "";
					var rDropName = "";
					rDragName = ui.draggable.attr("id");
					rDropName = this.id;
					
					if (document.getElementById(rDragName).innerHTML == document.getElementById(rDropName).innerHTML && 
						document.getElementById(rDropName).style.color == "lightgrey") {
						
						// Hide the dragged item
						document.getElementById(rDragName).style.display = "none";
						document.getElementById(rDropName).style.color = "#000000";
						document.getElementById(rDropName).style.zIndex = "1001";
						document.getElementById(rDragName).style.zIndex = "1002";
						
						// Track this placement in global state
						if (!rAllSlidesState[slideIndex]) {
							rAllSlidesState[slideIndex] = {};
						}
						rAllSlidesState[slideIndex][rDragName] = {
							dragDisplay: "none",
							dropColor: "#000000",
							dragValue: document.getElementById(rDragName).innerHTML
						};
					}
					
					// Check if current slide is complete
					var allComplete = true;
					for (var i = 1; i <= totalItems; i++) {
						var dragElement = document.getElementById("divDrag_" + prefix + "_" + i);
						if (dragElement && dragElement.style.display != "none") {
							allComplete = false;
							break;
						}
					}
					
					if (allComplete) {
						document.getElementById("divDragAndDropAreaDisable").style.display = "block";
						document.getElementById("divCorrectTextPanel").style.display = "block";
					}
					
					// Check if ALL slides are complete to update the completion message
					updateCompletionMessage();
				};
			}
			
			// Update the completion message based on overall progress
			function updateCompletionMessage() {
				var allComplete = checkAllSlidesComplete();
				var completionMessage = document.getElementById("divCorrectTextPanel").querySelector('div:first-child');
				
				if (allComplete) {
					completionMessage.innerHTML = "loos";
				} else {
					completionMessage.innerHTML = "loos";
				}
			}
			
			// Check if all slides are complete
			function checkAllSlidesComplete() {
				// Check if all 8 slides are complete
				var slidesConfig = [
					{ index: 1, count: 4, prefix: "1" }, // slide 1 has 4 items
					{ index: 2, count: 5, prefix: "2" }, // slide 2 has 5 items
					{ index: 3, count: 3, prefix: "3" }, // slide 3 has 3 items
					{ index: 4, count: 5, prefix: "4" }, // slide 4 has 5 items
					{ index: 5, count: 4, prefix: "5" }, // slide 5 has 4 items
					{ index: 6, count: 3, prefix: "6" }, // slide 6 has 3 items
					{ index: 7, count: 6, prefix: "7" }, // slide 7 has 6 items
					{ index: 8, count: 5, prefix: "8" }  // slide 8 has 5 items
				];
				
				var allComplete = true;
				
				for (var s = 0; s < slidesConfig.length; s++) {
					var slide = slidesConfig[s];
					var slideComplete = true;
					
					for (var i = 1; i <= slide.count; i++) {
						var element = document.getElementById("divDrag_" + slide.prefix + "_" + i);
						if (element && element.style.display != "none") {
							slideComplete = false;
							break;
						}
					}
					
					if (!slideComplete) {
						allComplete = false;
						break;
					}
				}
				
				return allComplete;
			}
			
			function doNavigateAct(rAction) {
				// Store current slide state before navigating
				if (rListIndex > 0 && rListIndex <= 8) {
					storeCurrentSlideState(rListIndex);
				}
				
				// Hide completion message when navigating
				document.getElementById("divDragAndDropAreaDisable").style.display = "none";
				document.getElementById("divCorrectTextPanel").style.display = "none";
				
				// Navigate to new slide
				if (rAction.toUpperCase() == "NO") {
					// do nothing
				} else {
					if (rAction.toUpperCase() == "N") {
						rListIndex++;
					} else {
						rListIndex--;
					}
				}
				
				if (rListIndex <= 0) {
					rListIndex = 0;
				}
				
				if (rListIndex >= rArrDivList.length - 1) {
					rListIndex = rArrDivList.length - 1;
				}
				
				// Update navigation buttons
				if (rListIndex <= 0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
					if (rListIndex >= rArrDivList.length - 1) {
						document.getElementById("divBtnReplay").style.display = "inline-block";
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "none";
					} else {
						document.getElementById("divBtnReplay").style.display = "inline-block";
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "inline-block";				
					}
				}
				
				// Hide all slides
				for (var i = 0; i < rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				// Show current slide
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
				
				// Initialize slide based on index
				if (rListIndex == 1) {
					initializeSlide1();
				} else if (rListIndex == 2) {
					initializeSlide2();
				} else if (rListIndex == 3) {
					initializeSlide3();
				} else if (rListIndex == 4) {
					initializeSlide4();
				} else if (rListIndex == 5) {
					initializeSlide5();
				} else if (rListIndex == 6) {
					initializeSlide6();
				} else if (rListIndex == 7) {
					initializeSlide7();
				} else if (rListIndex == 8) {
					initializeSlide8();
				}
				
				// Restore state for the new slide
				if (rListIndex > 0 && rListIndex <= 8) {
					restoreSlideState(rListIndex);
				}
			}
			
			// Initialize Slide 1
			function initializeSlide1() {
				doShuffleSlideArray(rArrSlide1DragListLetter);
				for (i = 1; i <= 4; i++) {
					document.getElementById("divDrag_1_" + i).innerHTML = rArrSlide1DragListLetter[i - 1];
				}
				
				$(".clsDrag").draggable({
					axis: "x, y", 
					containment: "#divDragAreaSlide_1", 
					revert: true,
					drag: function(event, ui) {
						for (var i = 1; i <= 4; i++) {
							document.getElementById("divDrag_1_" + i).style.zIndex = "auto";
						}
						document.getElementById(this.id).style.zIndex = 9998;
					}
				});
				
				$(".clsDrop").droppable({
					drop: createDropHandler(1, 4, "1")
				});
			}

			function doShuffleSlideArray(array) {
				var currentIndex = array.length;
				while (currentIndex != 0) {
					var randomIndex = Math.floor(Math.random() * currentIndex);
					currentIndex--;
					[array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
				}
			}
			
			function doResetActivity() {
				// Reset all global state
				rAllSlidesState = {};
				
				document.getElementById("divDragAndDropAreaDisable").style.display = "none";
				document.getElementById("divCorrectTextPanel").style.display = "none";
				
				for (var i = 0; i < rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;
				
				if (rListIndex <= 0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
					if (rListIndex >= rArrDivList.length - 1) {
						document.getElementById("divBtnReplay").style.display = "inline-block";
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "none";
					} else {
						document.getElementById("divBtnReplay").style.display = "inline-block";
						document.getElementById("divBtnBack").style.display = "inline-block";
						document.getElementById("divBtnNext").style.display = "inline-block";				
					}
				}
				
				for (i = 1; i <= 4; i++) {
					document.getElementById("divDrag_1_" + i).innerHTML = rArrSlide1DragListLetter[i-1];
					document.getElementById("divDrag_1_" + i).style.color = "#000000";
					document.getElementById("divDrop_1_" + i).style.color = "lightgrey";
					document.getElementById("divDrag_1_" + i).style.display = "block";
				}
				
				for (i = 1; i <= 5; i++) {
