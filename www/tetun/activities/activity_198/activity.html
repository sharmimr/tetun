      var rListIndex = 0;

      function doNavigateToSlide(rTempListIndex) {
        rListIndex = rTempListIndex;
        doNavigateAct("No");
      }

      function doNavigateAct(rAction) {
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";
        }

        if (rAction.toUpperCase() == "NO") {
        } else {
          if (rAction.toUpperCase() == "N") {
            rListIndex++;
          } else {
            rListIndex--;
          }
        }

        if (rListIndex <= 0) {
          rListIndex = 0;
        }

        if (rListIndex >= rArrDivList.length - 1) {
          rListIndex = rArrDivList.length - 1;
        }

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        } else {
          if (rListIndex >= rArrDivList.length - 1) {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        if (rListIndex > 0) {
          document.getElementById("divBtnReplay").style.display =
            "inline-block";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";
        }

        doShowActivity();

        document.getElementById("divDragAndDropAreaDisable").style.display =
          "none";
        document.getElementById("divCorrectTextPanel").style.display = "none";
        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }

      function doShuffleSlideArray(array) {
        var currentIndex = array.length;
        while (currentIndex != 0) {
          var randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [
            array[randomIndex],
            array[currentIndex],
          ];
        }
      }

      function doShowActivity() {
        rDropCoinCount = 0;
        rNumCoinCount = 0;

        if (rListIndex <= 0) {
          document.getElementById("divQuestionMarkPanel").style.display =
            "none";
          document.getElementById("divCorrectTextPanel").style.display = "none";
          document.getElementById("divDragAndDropAreaDisable").style.display =
            "none";
        } else {
          document.getElementById("divQuestionMarkPanel").style.display =
            "block";
          document.getElementById("divCorrectTextPanel").style.display = "none";
          document.getElementById("divDragAndDropAreaDisable").style.display =
            "none";

          for (var i = 1; i <= 6; i++) {
            document.getElementById("divCoin_" + i).style.display = "block";
          }
          for (var i = 1; i <= 6; i++) {
            document.getElementById("divTableCoin_" + i).style.display = "none";
          }
          for (var i = 1; i <= 10; i++) {
            if (
              document.getElementById("divFruitSmall_" + i).style.display !=
              "block"
            ) {
              document.getElementById("divFruitSmall_" + i).style.display =
                "none";
            }
          }

          doGetFinalCoinsNumberArray();
          doShowBoradNumberAndBigFruit();
        }
      }

      var rNumCoinCount = 0;

      var rHiddenBigFruit = null;
      var rVisibleSmallFruit = null;

      function doShowBoradNumberAndBigFruit() {
        var rBoardText =
          rArrBoardNumberText[
            Math.floor(Math.random() * rArrBoardNumberText.length)
          ];
        var rrBoardTextSPL = rBoardText.split("_");
        document.getElementById("divSlideLetter_1").innerHTML =
          rrBoardTextSPL[0];
        document.getElementById("divSlideLetter_2").innerHTML =
          rrBoardTextSPL[1];

        var rBigFruitImage =
          rArrBigFruit[Math.floor(Math.random() * rArrBigFruit.length)];
        document.getElementById("imgFruitBig").src = "images/" + rBigFruitImage;
        document.getElementById("divSlideFruitPanelMain").style.display =
          "block";

        document.getElementById("divNumberCountLetter_1").innerHTML = "";
        document.getElementById("divNumberCountLetter_2").innerHTML = "";

        var rSplMain = rBigFruitImage.split(".");
        var rSplSub = rSplMain[0].split("_");
        rHiddenBigFruitNum = rSplSub[rSplSub.length - 1];
        rHiddenBigFruit = document.getElementById("divSlideFruitPanelMain");
        rVisibleSmallFruit = document.getElementById(
          "divFruitSmall_" + rHiddenBigFruitNum,
        );
        //rVisibleSmallFruit.style.display = "block";
      }

      function doBigCoinClick(rObj) {
        for (var i = 1; i <= 6; i++) {
          if (
            rObj.getElementsByTagName("img")[0].src.toLowerCase() ==
            document
              .getElementById("divTableCoin_" + i)
              .getElementsByTagName("img")[0].src
          ) {
            if (
              document.getElementById("divTableCoin_" + i).style.display !=
              "block"
            ) {
              document.getElementById("divTableCoin_" + i).style.display =
                "block";
              break;
            }
          }
        }
        rObj.style.display = "none";
        doDisplayCountNum(rObj, "P");
        //rVisibleSmallFruit.style.display = "block";
      }

      function doTableCoinClick(rObj) {
        for (var i = 1; i <= 6; i++) {
          if (
            rObj.getElementsByTagName("img")[0].src.toLowerCase() ==
            document
              .getElementById("divCoin_" + i)
              .getElementsByTagName("img")[0].src
          ) {
            if (
              document.getElementById("divCoin_" + i).style.display != "block"
            ) {
              document.getElementById("divCoin_" + i).style.display = "block";
              break;
            }
          }
        }
        rObj.style.display = "none";

        doDisplayCountNum(rObj, "M");
        //rVisibleSmallFruit.style.display = "block";
      }

      var rDropCoinCount = 0;
      var rNumCoinCount = 0;
      function doDisplayCountNum(rObj, rAction) {
        var rImageSrc = rObj.getElementsByTagName("img")[0].src;
        var rSplMain = rImageSrc.split("/");
        var rSplSub = rSplMain[rSplMain.length - 1].split("_");
        rNumCoinCount = Number(rSplSub[1]);
        if (rAction == "P") {
          rDropCoinCount = rDropCoinCount + rNumCoinCount;
        } else {
          rDropCoinCount = rDropCoinCount - rNumCoinCount;
        }
        if (rDropCoinCount <= 0) {
          document.getElementById("divNumberCountLetter_1").innerHTML = "";
          document.getElementById("divNumberCountLetter_2").innerHTML = "";
        } else {
          document.getElementById("divNumberCountLetter_1").innerHTML =
            rDropCoinCount;
          document.getElementById("divNumberCountLetter_2").innerHTML = "c";
        }
      }

      function doCheckAnswer(rObj) {
        if (

          document.getElementById("divQuestionMarkPanel").style.display =

          document.getElementById("divCorrectTextPanel").style.display =
            "block";
        } else {
          doFruitShake();
        }
      }

      var rMainInterval = 0;

      var rFruitShakeLoopNum = 0;
      function doFruitShake() {
        document.getElementById("divDragAndDropAreaDisable").style.border =
          "0px solid red";
        document.getElementById("divDragAndDropAreaDisable").style.display =
          "block";

        var rFadInAndOutCount = 0;
        for (var i = 1; i <= 3; i++) {
          $(rHiddenBigFruit).fadeOut("300", function () {});

          $(rHiddenBigFruit).fadeIn("300", function () {
            rFadInAndOutCount++;
            if (rFadInAndOutCount == 3) {
              document.getElementById(
                "divDragAndDropAreaDisable",
              ).style.display = "none";
            }
          });
        }
      }

      function doResetActivity() {
        for (var i = 0; i < rArrDivList.length; i++) {
          document.getElementById(rArrDivList[i]).style.display = "none";

        if (rListIndex <= 0) {
          document.getElementById("divBtnReplay").style.display = "none";
          document.getElementById("divBtnBack").style.display = "none";
          document.getElementById("divBtnNext").style.display = "inline-block";

            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display = "none";
          } else {
            document.getElementById("divBtnReplay").style.display =
              "inline-block";
            document.getElementById("divBtnBack").style.display =
              "inline-block";
            document.getElementById("divBtnNext").style.display =
              "inline-block";
          }
        }

        doShowActivity();

        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";

      function doShuffleCoinsNumber(array) {
        var currentIndex = array.length;
        while (currentIndex != 0) {
          var randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [
            array[randomIndex],
            array[currentIndex],
          ];
        }
      }

      var rArrCurrentCoinsNumber = [];

      function doGetFinalCoinsNumberArray() {
        rCoinsRandomNumber = Math.floor(Math.random() * rArrCoinsNumber.length);
        doShuffleCoinsNumber(rArrCoinsNumber);
