			var rArrDivList = ["div_1"];
			var rListIndex = 0;
			
			function doNavigateAct(rAction) {
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrDivList.length-1) {
					rListIndex = rArrDivList.length-1;
				}
				/*
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				*/
				document.getElementById("divBtnReplay").style.display = "inline-block";
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnNext").style.display = "none";

				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}

			function doResetActivity() {
				doShuffleArray(rArrOpenAniImgList);
				rArrCloseAniImgList = [];
				for (var i=0; i<rArrOpenAniImgList.length; i++) {
					var rTempSpl = rArrOpenAniImgList[i].split("_");
					var rTempVal = rTempSpl[0] + "_" + "b.gif";
					rArrCloseAniImgList.push(rTempVal);
				}
			
				rArrCorrectAniImgList = [];
				for (var i=0; i<rArrOpenAniImgList.length; i++) {
					var rTempSpl = rArrOpenAniImgList[i].split("_");
					var rTempVal = rTempSpl[0] + "_" + "c.gif";
					rArrCorrectAniImgList.push(rTempVal);
				}				
				
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;
				/*
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				*/
				//document.getElementById("divBtnNext").style.display = "none";

				document.getElementById("divBtnReplay").style.display = "inline-block";
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnNext").style.display = "none";
				
				var rDivFlipLen = document.getElementsByName("divFlip").length;
				for (var i=1; i<=rDivFlipLen; i++) {
					document.getElementById("divFlip_"+i).style.cursor = "pointer";
					document.getElementById("divFlip_"+i).getElementsByTagName("img")[0].src = "images/woodtexture.png";
				}

				document.getElementById("divDisable").style.display = "none";				
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}
			
			function doShuffleArray(rArray) {
				var rCurrentIndex = rArray.length;
				while (rCurrentIndex != 0) {
					var rRandomIndex = Math.floor(Math.random() * rCurrentIndex);
					rCurrentIndex--;
					[rArray[rCurrentIndex], rArray[rRandomIndex]] = [rArray[rRandomIndex], rArray[rCurrentIndex]];
				}
			}			
			
			var rArrOpenAniImgList = ["1_a.gif", "1_a.gif", "2_a.gif", "2_a.gif", "3_a.gif", "3_a.gif", "4_a.gif", "4_a.gif", "5_a.gif", "5_a.gif", "6_a.gif", "6_a.gif"];
			var rArrCloseAniImgList = ["1_b.gif", "1_b.gif", "2_b.gif", "2_b.gif", "3_b.gif", "3_b.gif", "4_b.gif", "4_b.gif", "5_b.gif", "5_b.gif", "6_b.gif", "6_b.gif"];
			var rArrCorrectAniImgList = ["1_c.gif", "1_c.gif", "2_c.gif", "2_c.gif", "3_c.gif", "3_c.gif", "4_c.gif", "4_c.gif", "5_c.gif", "5_c.gif", "6_c.gif", "6_c.gif"];
			
			
			var rFirstClickedDiv = "";
			var rSecondClickedDiv = "";
			var rCloseAniImage = "";
			var rCorrectAniImage = "";
			var rDivIdNum = 0;
			var rDivIdNum_1 = 0;
			var rDivIdNum_2 = 0;
			var rNumberOfCorrect = 0;
			function doOpenImage(rObj) {
				if (rObj.style.cursor=="pointer") {
					if (rFirstClickedDiv=="") {
						rFirstClickedDiv = rObj.id;
					} else {
						rSecondClickedDiv = rObj.id;
					}
					
					rDivIdNum = Number(rObj.id.split("_")[1]);
					rObj.getElementsByTagName("img")[0].src = "images/" + rArrOpenAniImgList[rDivIdNum-1];
					
					if (rFirstClickedDiv!="" && rSecondClickedDiv=="") {
						document.getElementById("divDisable").style.display = "block";
						window.setTimeout(function() {
							document.getElementById("divDisable").style.display = "none";
						}, 1000);						
					}

					if (rFirstClickedDiv!="" && rSecondClickedDiv!="") {
						document.getElementById("divDisable").style.display = "block";
						window.setTimeout(function() {
							doCkeckCorrect();
						}, 1000);					
					}
				}
			}
			
			
			function doCkeckCorrect() {
				rDivIdNum_1 = Number(rFirstClickedDiv.split("_")[1]);
				rDivIdNum_2 = Number(rSecondClickedDiv.split("_")[1]);
					
				var rFirstImageSpl = document.getElementById(rFirstClickedDiv).getElementsByTagName("img")[0].src.split("/");
				var rFirstImage = rFirstImageSpl[rFirstImageSpl.length-1];
				
				var rSecondImageSpl = document.getElementById(rSecondClickedDiv).getElementsByTagName("img")[0].src.split("/");
				var rSecondImage = rSecondImageSpl[rSecondImageSpl.length-1];

				if (rFirstImage==rSecondImage) {
					rNumberOfCorrect++;
					window.setTimeout(function() {
						document.getElementById(rFirstClickedDiv).getElementsByTagName("img")[0].src = "images/" + rArrCorrectAniImgList[rDivIdNum_1-1];
						document.getElementById(rSecondClickedDiv).getElementsByTagName("img")[0].src = "images/" + rArrCorrectAniImgList[rDivIdNum_2-1];
						
						document.getElementById(rFirstClickedDiv).style.cursor = "default";
						document.getElementById(rSecondClickedDiv).style.cursor = "default";						
										
						rFirstClickedDiv = "";
						rSecondClickedDiv = "";
						rCloseAniImage = "";
						rCorrectAniImage = "";
						rDivIdNum = 0;
						rDivIdNum_1 = 0;
						rDivIdNum_2 = 0;
						window.setTimeout(function() {
							document.getElementById("divDisable").style.display = "none";
							if (rNumberOfCorrect>=6) {
								doResetActivity();
							}
						}, 1000);
					}, 1000);				
				} else {
					document.getElementById(rFirstClickedDiv).getElementsByTagName("img")[0].src = "images/" + rArrCloseAniImgList[rDivIdNum_1-1];
					document.getElementById(rSecondClickedDiv).getElementsByTagName("img")[0].src = "images/" + rArrCloseAniImgList[rDivIdNum_2-1];
					
					window.setTimeout(function() {
						document.getElementById(rFirstClickedDiv).getElementsByTagName("img")[0].src = "images/woodtexture.png";
						document.getElementById(rSecondClickedDiv).getElementsByTagName("img")[0].src = "images/woodtexture.png";

						rFirstClickedDiv = "";
						rSecondClickedDiv = "";
						rCloseAniImage = "";
						rCorrectAniImage = "";
						rDivIdNum = 0;
						rDivIdNum_1 = 0;
						rDivIdNum_2 = 0;
						
						document.getElementById("divDisable").style.display = "none";
					}, 500);					
				}
				
				
			}
		</script>
