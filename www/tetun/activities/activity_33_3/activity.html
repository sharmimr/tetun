			var rArrDivList = ["div_1", "div_2", "div_3"];

			function doNavigateAct(rAction, rDragId) {
				rDropCorrect2Excuted = false;
				
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrDivList.length-1) {
					rListIndex = rArrDivList.length-1;
				}
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }

				if (rListIndex==1) {
					document.getElementById("divBtnNext").style.display = "none";
					
					document.getElementById("divImgMain").style.display = "block";
					
					for (var i=1; i<=6; i++) {
						document.getElementById("divDrag_" + i).style.display = "block";
					}
					/*
					for (var i=1; i<=6; i++) {
						document.getElementById("divDrop_" + i).style.opacity = 0;
					}
*/					

					$(".clsBox_2").draggable({
						axis: "x, y", containment: "#divDragArea_2", revert: true,
						drag: function(event, ui) {
							if (document.getElementById(this.id).id=="divDrag_1") {
								if (document.getElementById("divDrop_1").style.opacity==0) {
									if (doOverlapCheck(document.getElementById("divDrag_1"), document.getElementById("divDrop_2"))) {
										document.getElementById("divDrag_1").style.display = "none";
										document.getElementById("divDrop_1").style.opacity = 1;
									}
								} else {
								if (document.getElementById("divDrop_2").style.opacity==0) {
									if (doOverlapCheck(document.getElementById("divDrag_1"), document.getElementById("divDrop_2"))) {
										document.getElementById("divDrag_1").style.display = "none";
										document.getElementById("divDrop_2").style.opacity = 1;									
									}
								} }
							}

							if (document.getElementById(this.id).id=="divDrag_2") {
								if (document.getElementById("divDrop_1").style.opacity==0) {
									if (doOverlapCheck(document.getElementById("divDrag_2"), document.getElementById("divDrop_1"))) {
										document.getElementById("divDrag_2").style.display = "none";
										document.getElementById("divDrop_1").style.opacity = 1;
									}
								} else {
								if (document.getElementById("divDrop_2").style.opacity==0) {
									if (doOverlapCheck(document.getElementById("divDrag_2"), document.getElementById("divDrop_2"))) {
										document.getElementById("divDrag_2").style.display = "none";
										document.getElementById("divDrop_2").style.opacity = 1;									
									}
								} }
							}
							if (document.getElementById(this.id).id=="divDrag_3") {
								if (doOverlapCheck(document.getElementById("divDrag_3"), document.getElementById("divDrop_3"))) {
									document.getElementById("divDrag_3").style.display = "none";
									document.getElementById("divDrop_3").style.opacity = 1;
								}
							}
							if (document.getElementById(this.id).id=="divDrag_4") {
								if (doOverlapCheck(document.getElementById("divDrag_4"), document.getElementById("divDrop_4"))) {
									document.getElementById("divDrag_4").style.display = "none";
									document.getElementById("divDrop_4").style.opacity = 1;
								}
							}
							if (document.getElementById(this.id).id=="divDrag_5") {
								if (doOverlapCheck(document.getElementById("divDrag_5"), document.getElementById("divDrop_5"))) {
									document.getElementById("divDrag_5").style.display = "none";
									document.getElementById("divDrop_5").style.opacity = 1;
								}
							}
							if (document.getElementById(this.id).id=="divDrag_6") {
								if (doOverlapCheck(document.getElementById("divDrag_6"), document.getElementById("divDrop_6"))) {
									document.getElementById("divDrag_6").style.display = "none";
									document.getElementById("divDrop_6").style.opacity = 1;
								}
							}							

							doCheckAllDropCorrect_2();
						}
					});
				}
				
				var rDropCorrect2Excuted = false;
				function doCheckAllDropCorrect_2() {
					if (rDropCorrect2Excuted==false) {
						if (document.getElementById("divDrop_1").style.opacity==1 && document.getElementById("divDrop_2").style.opacity==1 && document.getElementById("divDrop_3").style.opacity==1 && document.getElementById("divDrop_4").style.opacity==1 && document.getElementById("divDrop_5").style.opacity==1 && document.getElementById("divDrop_6").style.opacity==1) {
							doNavigateAct("N");
							document.getElementById("divBtnNext").style.display = "none";
							doResetMainNavButton();
							rDropCorrect2Excuted = true;
						}
					}
				}
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}

			function doResetActivity() {
				rDropCorrect2Excuted = false
				
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;

				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				
				document.getElementById("divImgMain").style.display = "block";
				
				for (var i=1; i<=6; i++) {
					document.getElementById("divDrag_" + i).style.display = "block";
				}
				for (var i=1; i<=6; i++) {
					document.getElementById("divDrop_" + i).style.opacity = 0;
				}
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}
			
			function doOverlapCheck(a, b) {
			  var rect1 = a.getBoundingClientRect();
			  var rect2 = b.getBoundingClientRect();
			  var isInHoriztonalBounds = rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x;
			  var isInVerticalBounds = rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
			  var isOverlapping = isInHoriztonalBounds && isInVerticalBounds;
			  return isOverlapping;
			}			
		</script>
