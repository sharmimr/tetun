							rDropCorrect2Excuted = true;
						}
					}
				}

			}

			function doResetActivity() {

				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {

					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";

					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";

				document.getElementById("divImage_2_2").getElementsByTagName("img")[0].src = "images/img_part_1.png";

				document.getElementById("divImage_2_2_1").style.left = "412px";
				document.getElementById("divImage_2_2_1").style.top = "53px";				
					
				document.getElementById("divImage_2_1").style.display = "inline-block";

				document.getElementById("divImage_2_1_1").style.display = "none";

				document.getElementById("divDrop_1").style.display = "block";
				document.getElementById("divDrop_2").style.display = "block";				

				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}
			
			function doOverlapCheck(a, b) {
			  var rect1 = a.getBoundingClientRect();
			  var rect2 = b.getBoundingClientRect();
			  var isInHoriztonalBounds = rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x;
			  var isInVerticalBounds = rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
			  var isOverlapping = isInHoriztonalBounds && isInVerticalBounds;
			  return isOverlapping;
			}
