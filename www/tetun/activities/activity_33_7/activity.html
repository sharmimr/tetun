        document.getElementById(rArrDivList[rListIndex]).style.display =
          "block";
      }

      function doOverlapCheck(a, b) {
        var rect1 = a.getBoundingClientRect();
        var rect2 = b.getBoundingClientRect();
        var isInHoriztonalBounds =
          rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x;
        var isInVerticalBounds =
          rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
        var isOverlapping = isInHoriztonalBounds && isInVerticalBounds;
        return isOverlapping;
      }
