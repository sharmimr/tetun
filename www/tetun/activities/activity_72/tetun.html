			function doNavigateAct(rAction) {
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrDivList.length-1) {
					rListIndex = rArrDivList.length-1;
				}
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}

			function doResetActivity() {
				for (var i=0; i<rArrDivList.length; i++) {
					document.getElementById(rArrDivList[i]).style.display = "none";
				}
				
				rListIndex = 0;
				
				var rSlideNum = -1
				var rSlideNumURL = rDocumentURL;
				var rSlideNumURLSpl = rSlideNumURL.split("&");
				var rSlideNumSplit = rSlideNumURLSpl[rSlideNumURLSpl.length-1].split("=");
				rSlideNum = Number(rSlideNumSplit[1]);
				
				if (rSlideNum.toString()!="NaN") {
					rListIndex = rSlideNum;
				}

				if (rListIndex>=4 && rListIndex<=6) {
					rListIndex = 2;
				} else {
				if (rListIndex>=7 && rListIndex<=12) {
					rListIndex = 3;
				} else {
				if (rListIndex>=13 && rListIndex<=17) {
					rListIndex = 4;
				} else {
				if (rListIndex>=18 && rListIndex<=21) {
					rListIndex = 5;
				} else {
				if (rListIndex>=22 && rListIndex<=24) {
					rListIndex = 6;	
				} else {
				if (rListIndex>=25 && rListIndex<=26) {
					rListIndex = 7;
				} else {
				if (rListIndex>=27 && rListIndex<=31) {
					rListIndex = 8;
				} else {
				if (rListIndex>=32 && rListIndex<=34) {
					rListIndex = 9;
				} else {
				if (rListIndex>=35 && rListIndex<=37) {
					rListIndex = 10;
				} else {
				if (rListIndex>=38) {
					rListIndex = 11;					
				} } } } } } } } } }
				
				rListIndex = 0;
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrDivList.length-1) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {

					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById(rArrDivList[rListIndex]).style.display = "block";
			}
			
			function doNavigate(rNum) {
				switch (rNum) {

						break;
					default:
						break;
				}
			}
