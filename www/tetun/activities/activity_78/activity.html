			function doHideAllMainDiv() {
				document.getElementById("divMain").style.display = "none";
				document.getElementById("divCommon").style.display = "none";
				document.getElementById("divCommon").innerHTML = "";
			}

			function doMovePreNext(rAction) {
				if (rAction=="P") {
					rCurSlideId--;
					if (rCurSlideId<=1) {
						rCurSlideId = 1;
					}
				} else {
				if (rAction=="N") {
					rCurSlideId++;
					if (rCurSlideId>=7) {
						rCurSlideId = 7;
					}
				} }
				doSetAndShowHideMainDiv(rCurSlideId);
			}

			function doSetAndShowHideMainDiv(rSlideId) {
				doHideAllMainDiv();
				switch (rSlideId) {
					case 1:
						doShowSlide1();
						break;
					case 2:
						doShowSlide2();
						break;
					case 3:
						doShowSlide3();
						break;
					case 4:
						doShowSlide4();
						break;
					case 5:
						doShowSlide5();
						break;
					case 6:
						doShowSlide6();
						break;
					case 7:
						doShowSlide6();
						break;
					default:
						break;
				}
			}

				document.getElementById("divCorrectTextPanel").style.display = "none";

				document.getElementById("divBtnNextArrow").style.display = "none";

				document.getElementById("divMain_DivBotText_2").style.top = "225px";
