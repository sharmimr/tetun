<!doctype html>
<html lang="en">
	<head>
		<title>Timor Home App</title>
		
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
		<link rel="shortcut icon" href="image/logo.png" />
		<link rel="apple-touch-icon" href="image/logo.png" />
		-->
		<link rel="stylesheet" type="text/css" href="../../../css/jquery-ui.css" />
		<link rel="stylesheet" type="text/css" href="../../../css/jqueryui-style.css" />
		<link rel="stylesheet" type="text/css" href="../../../css/font_awesome.css" />
		<link rel="stylesheet" type="text/css" href="../../../css/main.css" />
		
		<style>
		</style>		

		<script src="../../../js/jquery-3.6.0.js"></script>
		<script src="../../../js/jquery-ui.js"></script>
		<script type="text/javascript" src="../../../js/main.js"></script>
		
		<script language="javascript">
			var rArrImgList = ["1.png", "2.png", "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png", "11.png", "12.png", "13.png", "14.png", "15.png", "16.png", "17.png", "18.png", "19.png", "20.png", "21.png", "22.png", "23.png", "24.png", "25.png", "26.png", "27.png", "28.png", "29.png", "30.png", "31.png", "32.png", "33.png", "34.png", "35.png", "36.png", "37.png", "38.png", "39.png", "40.png", "41.png", "42.png", "43.png", "44.png", "45.png", "46.png", "47.png", "48.png", "49.png", "50.png", "51.png", "52.png", "53.png", "54.png", "55.png", "56.png", "57.png", "58.png", "59.png", "60.png", "61.png", "62.png", "63.png", "64.png", "65.png", "66.png", "67.png"];
			var rListIndex = 0;
			var rSelectedID = 0;
			rSelectedID = doGetParameterByName('ID');
			rListIndex = Number(rSelectedID);
			
			function doNavigateAct(rAction) {
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnNext").style.display = "none";
				
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 1;
				}

				if (rListIndex>=rArrImgList.length) {
					rListIndex = rArrImgList.length;
				}
				
				if (rListIndex<=1) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrImgList.length) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById("imgFotoAct").src = "images/" + rArrImgList[rListIndex-1];
			}			

			function doResetActivity(rObj) {
				if (rObj!=null && rObj!=undefined && rObj!="" && rObj.id.toUpperCase()=="DIVBTNREPLAY") {
					rListIndex = 1
				}
				if (rListIndex<=1) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrImgList.length) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }
				
				document.getElementById("imgFotoAct").src = "images/" + rArrImgList[rListIndex-1];
			}
		</script>		
	</head>

	<body bgcolor="#000000">
		<div id="divWrapper" name="divWrapper" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid red;">
			<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
				<tr>
					<td width="100%" height="100%" align="center" valign="middle">
						<div id="divContainer" name="divContainer" style="position:relative; width:730px; height:310px; background-color:#ffffff; border:0px solid blue;">
							<div style="position:relative; width:100%; height:100%; left:0px; top:0px; background:transparent; border:0px solid green;">
								<div style="position:relative; top:25px; cursor:default; display:block;">
									<table width="100%" height="100%" align="center" cellspacing="0" cellpadding="0" border="0">
										<tr>
											<td align="center" valign="middle">
												<div style="position:relative;  display:block;">
													<img id="imgFotoAct" name="imgFotoAct" width="auto" height="200" src="images/1.png" />
												</div>
											</td>
										</tr>
									</table>								
								</div>							
								<div id="divBtnPanel" name="divBtnPanel" style="position:absolute; width:100%; height:auto; left:0px; bottom:0px; border:0px solid #333333; display:block;">
									<div id="divBtnBack" name="divBtnBack" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doNavigateAct('P');">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img class="clsMicroBack" src="../../../images/back_arrow.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
									<div style="position:relative; width:10px; display:inline-block;"></div>
									<div id="divBtnReplay" name="divBtnReplay" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doResetActivity(this);">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img class="clsMicroReplay" src="../../../images/replay.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>
									<div style="position:relative; width:10px; display:inline-block;"></div>								
									<div id="divBtnNext" name="divBtnNext" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doNavigateAct('N');">
										<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
											<tr>
												<td align="center" valign="top">
													<div style="display:block;">
														<img class="clsMicroNext" src="../../../images/next_arrow.png" />
													</div>
												</td>
											</tr>
										</table>									
									</div>									
								</div>								
							</div>
							
							<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red;">
								<div id="divPosterImage" name="divPosterImage" class="clsMacroPosterImage" style="cursor:pointer;">
									<img id="imgPoster" name="imgPoster" width="100%" height="100%" />
								</div>							
								<div id="divBtnBackArrow" name="divBtnBackArrow" class="clsMacroBack" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'P');">
									<img width="100%" height="100%" src="../../../images/back_arrow.png" />
								</div>
								<div id="divBtnNextArrow" name="divBtnNextArrow" class="clsMacroNext" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'N');">
									<img width="100%" height="100%" src="../../../images/next_arrow.png" />
								</div>					
								<div id="divBtnHome" name="divBtnHome" class="clsMacroHome" style="cursor:pointer;" onclick="javascript:doRedirectToURL(this, 'H');">
									<img width="100%" height="100%" src="../../../images/home.png" />
								</div>
							</div>							
						</div>
					</td>
				</tr>
			</table>
		</div>
		
		<script language="javascript">
			doResetActivity(null);
			doResetMainNavButton();
		</script>		
	</body>
</html>
