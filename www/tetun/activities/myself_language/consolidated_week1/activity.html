		<script language="javascript">
			var rArrImgList = ["abcde.png", "anim.png", "bel.png", "colors.png", "shape.png"];
			var rListIndex = 0;
			//rSelectedID = doGetParameterByName('ID');
			//rListIndex = Number(rSelectedID);
			
			function doNavigateAct(rAction) {
				if (rAction.toUpperCase()=="N") {
					rListIndex++;
				} else {
					rListIndex--;
				}
				
				if (rListIndex<=0) {
					rListIndex = 0;
				}

				if (rListIndex>=rArrImgList.length) {
					rListIndex = rArrImgList.length;
				}
				
				if (rListIndex<=0) {
					document.getElementById("divBtnReplay").style.display = "none";
					document.getElementById("divBtnBack").style.display = "none";
					document.getElementById("divBtnNext").style.display = "inline-block";			
				} else {
				if (rListIndex>=rArrImgList.length) {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "none";
				} else {
					document.getElementById("divBtnReplay").style.display = "inline-block";
					document.getElementById("divBtnBack").style.display = "inline-block";
					document.getElementById("divBtnNext").style.display = "inline-block";				
				} }

				if (rListIndex<=0) {
					document.getElementById("div_1").style.display = "block";
					document.getElementById("div_2").style.display = "none";
				} else {
					document.getElementById("div_1").style.display = "none";
					document.getElementById("div_2").style.display = "block";				
				}				
				
				if (rListIndex>=1) {
					document.getElementById("imgConsolidatedWeekAct").src = "images/" + rArrImgList[rListIndex-1];
				}
			}			

			function doResetActivity() {
				rListIndex = 0;
				rSelectedID = 0;
			
				document.getElementById("div_1").style.display = "none";
				document.getElementById("div_2").style.display = "none";
				
				document.getElementById("divBtnBack").style.display = "none";
				document.getElementById("divBtnReplay").style.display = "none";
				document.getElementById("divBtnNext").style.display = "inline-block";
				
				document.getElementById("div_1").style.display = "block";
			}
		</script>		
	</head>

	<body bgcolor="#000000">

									</div>
									<div style="position:relative; width:10px; display:inline-block;"></div>								
									<div id="divBtnNext" name="divBtnNext" style="position:relative; border:0px solid #666666; cursor:pointer; display:inline-block;" onclick="javascript:doNavigateAct('N');">

											<tr>
												<td align="center" valign="top">
