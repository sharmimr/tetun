      function doNavigateToURL(rObj) {
        var rId = Number(rObj.id.split("_")[1]);

            rNavURL = "theme_myself_level_1.html";

            break;
          case 4:

          case 5:
            rNavURL = "theme_environment_level_1.html";
            break;
          case 6:
            rNavURL = "theme_explore_level_1.html";
            break;
          default:

        }
