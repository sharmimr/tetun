<!doctype html>
<html lang="en">
  <head>
    <title>Timor Teacher App</title>

    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
		<link rel="shortcut icon" href="image/logo.png" />
		<link rel="apple-touch-icon" href="image/logo.png" />
		-->

    <link rel="stylesheet" type="text/css" href="css/jquery-ui.css" />
    <link rel="stylesheet" type="text/css" href="css/jqueryui-style.css" />
    <link rel="stylesheet" type="text/css" href="css/font_awesome.css" />
    <link rel="stylesheet" type="text/css" href="css/main.css" />

    <script src="js/jquery-3.6.0.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script type="text/javascript" src="js/main.js"></script>

    <script language="javascript">
      var rStrMainActivityList =
        "theme_celebration_level_3_art.html~activities/activity_159/activity.html";

      function doNavigateToActivity(rObj, rActURL) {
        if (rObj.style.cursor == "pointer") {
          document.location.href =
            rActURL + "?MainActivityList=" + rStrMainActivityList;
        }
      }
    </script>
  </head>

  <body bgcolor="#000000">
    <div
      id="divWrapper"
      name="divWrapper"
      style="
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0px;
        top: 0px;
        border: 0px solid red;
      "
      class="clsDivWrapper"
    >
      <table
        width="100%"
        height="100%"
        cellspacing="0"
        cellpadding="0"
        border="0"
      >
        <tr>
          <td width="100%" height="100%" align="center" valign="middle">
            <div
              id="divContainer"
              name="divContainer"
              style="
                position: absolute;
                width: 730px;
                height: 310px;
                left: 50%;
                margin-left: -365px;
                top: 50%;
                margin-top: -155px;
                border: 0px solid blue;
              "
            >
              <div
                style="
                  position: absolute;
                  width: 100%;
                  height: 100%;
                  left: 0px;
                  top: 0px;
                  border: 0px solid green;
                "
              >
                <div
                  style="
                    position: absolute;
                    width: 100%;
                    height: 100%;
                    left: 0px;
                    top: 0px;
                    border: 0px solid red;
                  "
                >
                  <table
                    align="center"
                    cellspacing="0"
                    cellpadding="0"
                    border="0"
                  >
                    <tr>
                      <td align="center" valign="top">
                        <div
                          style="
                            position: absolute;
                            width: 100%;
                            height: 100%;
                            left: 0px;
                            top: 0px;
                            border: 0px solid blue;
                          "
                        >
                          <img
                            width="100%"
                            height="100%"
                            src="images/theme/environment/level_3/wooden_board.png"
                          />
                          <div
                            style="
                              position: absolute;
                              width: 449px;
                              height: 210px;
                              left: 136px;
                              top: 35px;
                              background: #ffffff;
                              border: 0px solid red;
                            "
                          ></div>
                          <div
                            style="
                              position: absolute;
                              width: 450px;
                              height: 140px;
                              left: 135px;
                              top: 100px;
                              border: 0px solid green;
                              overflow: hidden;
                              overflow-y: auto;
                            "
                          >
                            <table
                              width="100%"
                              height="auto"
                              align="center"
                              cellspacing="0"
                              cellpadding="0"
                              border="0"
                            >
                              <tr>
                                <td width="100%" align="center" valign="top">
                                  <table
                                    width="100%"
                                    height="auto"
                                    align="center"
                                    cellspacing="0"
                                    cellpadding="0"
                                    border="0"
                                  >
                                    <tr>
                                      <td
                                        width="25%"
                                        align="center"
                                        valign="top"
                                      >
                                        <div
                                          id="divImage_1"
                                          name="divImage"
                                          style="
                                            color: #88552a;
                                            border: 0px solid blue;
                                            cursor: pointer;
                                            display: inline-block;
                                          "
                                          onclick="
                                            javascript: doNavigateToActivity(
                                              this,
                                              'activities/activity_159/activity.html',
                                            );
                                          "
                                        >
                                          <img
                                            width="100"
                                            height="auto"
                                            src="images/celebration_art_activity_thumbnail_images/image_1.png"
                                          />
                                        </div>
                                        <div
                                          class="clsPageThumbnailSmall"
                                          style="
                                            position: relative;
                                            top: 0px;
                                            font-size: 12px;
                                          "
                                        >
                                          Pinta manu-tolun
                                        </div>
                                      </td>
                                    </tr>
                                  </table>
                                </td>
                              </tr>
                            </table>
                          </div>
                        </div>
                      </td>
                    </tr>
                  </table>
                </div>
                <div
                  id="divHeadTitleText"
                  name="divHeadTitleText"
                  class="clsPageThumbnailHead"
                >
                  Selebrasaun
                </div>
              </div>
              <div
                id="divMacroBtnNavPanel"
                name="divMacroBtnNavPanel"
                style="
                  position: absolute;
                  width: 65px;
                  height: 100%;
                  right: 0px;
                  top: 0px;
                  border: 0px solid red;
                "
              >
                <div
                  id="divPosterImage"
                  name="divPosterImage"
                  class="clsMacroPosterImage"
                  style="cursor: pointer"
                  onclick="
                    javascript: document.location.href =
                      'theme_celebration_level_2.html';
                  "
                >
                  <img
                    id="imgPoster"
                    name="imgPoster"
                    width="100%"
                    height="100%"
                    src="images/activity_macro_static_images/celebration.png"
                  />
                </div>
                <div
                  id="divBtnBackArrow"
                  name="divBtnBackArrow"
                  style="
                    position: absolute;
                    width: auto;
                    height: 65px;
                    left: 0px;
                    top: 80px;
                    border: 0px solid blue;
                    cursor: pointer;
                    display: block;
                  "
                  onclick="
                    javascript: document.location.href =
                      'theme_celebration_level_2.html';
                  "
                >
                  <img width="100%" height="100%" src="images/back_arrow.png" />
                </div>
                <div
                  id="divBtnHome"
                  name="divBtnHome"
                  style="
                    position: absolute;
                    width: auto;
                    height: 105px;
                    left: 0px;
                    top: 200px;
                    border: 0px solid blue;
                    cursor: pointer;
                    display: block;
                  "
                  onclick="javascript: document.location.href = 'index.html';"
                >
                  <img width="100%" height="100%" src="images/home.png" />
                </div>
              </div>
            </div>
          </td>
        </tr>
      </table>
    </div>
    <script src="activity-tracker.js"></script>
  </body>
</html>
