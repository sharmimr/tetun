<!doctype html>
<html lang="en">
  <head>
    <title>Timor Home App</title>

    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://code.jquery.com/ui/1.13.1/themes/base/jquery-ui.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://jqueryui.com/resources/demos/style.css"
    />
    <link rel="stylesheet" type="text/css" href="css/font_awesome.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro&display=swap"
    />
    <link rel="stylesheet" type="text/css" href="css/main.css" />

    <style></style>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"></script>
    <script type="text/javascript" src="js/main.js"></script>

    <script language="javascript"></script>
  </head>

  <body
    bgcolor="#000000"
    onselect="javascript: return false;"
    onselectstart="javascript:return false"
    ondragstart="javascript: return false;"
    oncontextmenu="javascript: return false;"
  >
    <div
      id="divWrapper"
      name="divWrapper"
      style="
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0px;
        top: 0px;
        border: 0px solid red;
      "
    >
      <div
        id="divContainer"
        name="divContainer"
        style="
          position: absolute;
          width: 725px;
          height: 310px;
          left: 50%;
          margin-left: -365px;
          top: 50%;
          margin-top: -155px;
          border: 0px solid blue;
        "
      >
        <div
          style="
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0px;
            top: 0px;
            border: 0px solid green;
          "
        >
          <div
            style="
              position: absolute;
              width: 100%;
              height: 100%;
              left: 0px;
              top: 0px;
              border: 0px solid green;
            "
          >
            <img width="100%" height="100%" src="images/ohin_tema.png" />
          </div>
          <div
            id="divLink_1"
            name="divLink"
            style="
              position: absolute;
              width: 200px;
              height: 240px;
              left: 150px;
              top: 35px;
              color: #ffffff;
              border: 0px solid red;
              cursor: pointer;
            "
            onclick="
              javascript: document.location.href = 'today_session_day.html';
            "
          >
            <div
              style="position: absolute; width: 100%; height: auto; bottom: 0px"
            >
              <table
                width="100"
                height="auto"
                cellspacing="0"
                cellpadding="0"
                align="center"
              >
                <tr>
                  <td align="center" valign="bottom">
                    <div style="font-size: 25px; display: inline-block">
                      Ohin
                    </div>
                  </td>
                </tr>
              </table>
            </div>
          </div>
          <div
            id="divLink_2"
            name="divLink"
            style="
              position: absolute;
              width: 210px;
              height: 240px;
              left: 365px;
              top: 35px;
              color: #ffffff;
              border: 0px solid red;
              cursor: pointer;
            "
            onclick="javascript: document.location.href = 'theme.html';"
          >
            <div
              style="position: absolute; width: 100%; height: auto; bottom: 0px"
            >
              <table
                width="100"
                height="auto"
                cellspacing="0"
                cellpadding="0"
                align="center"
              >
                <tr>
                  <td align="center" valign="bottom">
                    <div style="font-size: 25px; display: inline-block">
                      Tema
                    </div>
                  </td>
                </tr>
              </table>
            </div>
          </div>
        </div>
        <div
          id="divMacroBtnNavPanel"
          name="divMacroBtnNavPanel"
          style="
            position: absolute;
            width: 65px;
            height: 100%;
            right: 0px;
            top: 0px;
            border: 0px solid red;
          "
        >
          <div
            id="divBtnHome"
            name="divBtnHome"
            style="
              position: absolute;
              width: auto;
              height: 105px;
              left: 0px;
              top: 200px;
              border: 0px solid blue;
              cursor: pointer;
              display: block;
            "
            onclick="javascript: document.location.href = 'index.html';"
          >
            <img width="100%" height="100%" src="images/home.png" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
