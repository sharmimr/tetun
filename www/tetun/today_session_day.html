<!doctype html>
<html lang="en">
	<head>
		<title>Timor Home App</title>
		
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" type="text/css" href="css/jquery-ui.css" />
		<link rel="stylesheet" type="text/css" href="css/jqueryui-style.css" />
		<link rel="stylesheet" type="text/css" href="css/font_awesome.css" />
		<link rel="stylesheet" type="text/css" href="css/main.css" />

		<script src="js/jquery-3.6.0.js"></script>
		<script src="js/jquery-ui.js"></script>
		<script type="text/javascript" src="js/main.js"></script>
		
		<script language="javascript">
			var rToday = new Date();
			var rDay = rToday.getDay();
			var rArrList = ["Segunda", "Tersa", "Kuarta", "Kinta", "Sesta"];
			var rArrListColor = ["#C84734", "#CD642A", "#AE7B20", "#46A297", "#9678B8"];
			var rSelectedDay = "Segunda";
			var rSelectedDayNumber = -1;
			
			var rPeriod = doGetParameterByName('Period');
			var rWeek = doGetParameterByName('Week');
			
			function doGetParameterByName(name, url = window.location.href) {
				name = name.replace(/[\[\]]/g, '\\$&');
				var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
					results = regex.exec(url);
				if (!results) return null;
				if (!results[2]) return '';
				return decodeURIComponent(results[2].replace(/\+/g, ' '));
			}			

			function doUpdateBottomCenterButtonClick(rObj) {
				if (rObj.style.cursor=="pointer") {
					var rTempInt = Number(rObj.id.split("_")[1]);
					if (rDay==rTempInt) {
						document.getElementById("vidAni").currentTime = 0;
						document.getElementById("vidAni").play();
						document.getElementById("divVidAni").style.display = "block";
					}					
					
					var rExistingText = document.getElementById("divTextAndImageCombination").innerHTML;
					rExistingText = "";
 					var rNewText = rArrList[rTempInt-1];
					var rNewTextColor = rArrListColor[rTempInt-1];
					rSelectedDay = rNewText;
					rSelectedDayNumber = rTempInt;
					document.getElementById("divTextAndImageCombination").innerHTML = rExistingText + ' ' + '<span style="color:' + rNewTextColor + ';">' + rNewText + '</span>';
					document.getElementById("divDayBtnPanel").style.display = "none";
					document.getElementById("divTextAndImageOnlyOne").innerHTML = "";
					
					window.setTimeout(
						function() {
							document.getElementById("divTextAndImageOnlyOne").innerHTML = rNewText;
							document.getElementById("divBtnBackArrow").style.display = "block";
							document.getElementById("divBtnNextArrow").style.display = "block";
						}, 2000
					)					
				}
			}
			
			function doNavigateToURL(rObj, rAction) {
				var rNavURL = "";
				if (rObj.style.cursor=="pointer") {
					switch (rAction.toUpperCase()) {
						case "H":
							rNavURL = "index.html";
							break;
						case "P":
							rNavURL = "today_and_theme.html";
							break;
						case "N":
							rNavURL = "today_session_month.html?DayNumber=" + rSelectedDayNumber + "&Day=" + rSelectedDay;
							break;						
						default:
							break;
					}					
					document.location.href = rNavURL;
				}
			}
		</script>
	</head>

	<body bgcolor="#000000">
		<div id="divWrapper" name="divWrapper" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid red;">
			<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
				<tr>
					<td width="100%" height="100%" align="center" valign="middle">
						<div id="divContainer" name="divContainer" style="position:relative; width:725px; height:310px; border:0px solid blue;">
							<div style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid green;">
								<div style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid green;">
									<img width="100%" height="100%" src="images/today_session_bg.png" />
								</div>
								<div id="divVidAni" name="divVidAni" style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid green; display:none;">
									<video id="vidAni" name="vidAni" playsinline poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" src="media/video/day/wave_tree_sun_plain.mp4" style="position:absolute; width:520px; height:295px; left:100px; top:10px; border-radius:25px;">
								</div>								
								<div style="position:absolute; width:100%; height:100%; left:0px; top:0px; border:0px solid green;">
									<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
										<tr>
											<td width="100%" height="100%" align="center" valign="middle">
												<div id="divTextAndImageCombination" name="divTextAndImageCombination" style="position:relative; top:0px; font-size:60px; color:#ffffff; display:inline-block;">Ohin</div>
											</td>
										<tr>
									</table>
								</div>
								<div id="divDayBtnPanel" name="divDayBtnPanel" style="position:absolute; width:100%; height:50px; left:-5px; bottom:10px; border:0px solid red; display:none;">
									<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
										<tr>
											<td width="100%" height="100%" align="center" valign="middle">
												<div id="divBtnMonday_1" name="divBtnMonday_2" style="display:inline-block; cursor:pointer;" onclick="javascript:doUpdateBottomCenterButtonClick(this);">
													<img width="auto" height="50" src="images/day/monday.png" />
												</div>
												<div id="divBtnTuesday_2" name="divBtnTuesday_3" style="display:inline-block; cursor:pointer;" onclick="javascript:doUpdateBottomCenterButtonClick(this);">
													<img width="auto" height="50" src="images/day/tuesday.png" />
												</div>
												<div id="divBtnWednesday_3" name="divBtnWednesday_4" style="display:inline-block; cursor:pointer;" onclick="javascript:doUpdateBottomCenterButtonClick(this);">
													<img width="auto" height="50" src="images/day/wednesday.png" />
												</div>
												<div id="divBtnThursday_4" name="divBtnThursday_5" style="display:inline-block; cursor:pointer;" onclick="javascript:doUpdateBottomCenterButtonClick(this);">
													<img width="auto" height="50" src="images/day/thursday.png" />
												</div>
												<div id="divBtnFriday_5" name="divBtnFriday_6" style="display:inline-block; cursor:pointer;" onclick="javascript:doUpdateBottomCenterButtonClick(this);">
													<img width="auto" height="50" src="images/day/friday.png" />
												</div>
											</td>
										</tr>
									</table>
								</div>
								<div style="position:absolute; width:95%; left:10px; top:10px; border:0px solid red; display:tabel-cell;">
									<table width="100%" height="100%" cellspacing="0" cellpadding="0" border="0">
										<tr>
											<td width="100%" height="100%" align="left" valign="top">
												<div id="divTextAndImageOnlyOne" name="divTextAndImageOnlyOne" style="position:relative; text-align:center; font-size:20px; color:#ffffff; border:0px solid blue; display:inline-block;">
												</div>
											</td>
										</tr>
									</table>
								</div>
								<div id="divMacroBtnNavPanel" name="divMacroBtnNavPanel" style="position:absolute; width:65px; height:100%; right:0px; top:0px; border:0px solid red; display:block;">
									<div id="divBtnBackArrow" name="divBtnBackArrow" style="position:absolute; width:auto; height:65px; left:0px; top:80px; border:0px solid blue; cursor:pointer; display:block;" onclick="javascript:doNavigateToURL(this, 'P');">
										<img width="100%" height="100%" src="images/back_arrow.png" />
									</div>
									<div id="divBtnNextArrow" name="divBtnNextArrow" style="position:absolute; width:auto; height:65px; left:0px; top:140px; border:0px solid blue; cursor:pointer; display:block;" onclick="javascript:doNavigateToURL(this, 'N');">
										<img width="100%" height="100%" src="images/next_arrow.png" />
									</div>					
									<div id="divBtnHome" name="divBtnHome" style="position:absolute; width:auto; height:105px; left:0px; top:200px; border:0px solid blue; cursor:pointer; display:block;" onclick="javascript:doNavigateToURL(this, 'H');">
										<img width="100%" height="100%" src="images/home.png" />
									</div>
								</div>
							</div>
						</div>
					</td>
				</tr>
			</table>
		</div>
		
		<script language="javascript">
			window.setTimeout(
				function() {
					document.getElementById("divDayBtnPanel").style.display = "block";
				}, 2000
			)
		</script>
		<script src="activity-tracker.js"></script>
</body>
</html>
