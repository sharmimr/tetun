			function doUpdateBottomCenterButtonClick(rObj) {
				if (rObj.style.cursor=="pointer") {
					var rTempInt = Number(rObj.id.split("_")[1]);

					if (rMonth==(rTempInt-1)) {
						document.getElementById("vidAni").currentTime = 0;
						document.getElementById("vidAni").play();
						document.getElementById("divVidAni").style.display = "block";
					}
					
					var rExistingText = document.getElementById("divTextAndImageCombination").innerHTML;
					rExistingText = "";
					var rNewText = rArrList[rTempInt-1];
					var rNewTextColor = rArrListColor[rTempInt-1];
					rSelectedMonth = rNewText;
					rSelectedMonthNumber = rTempInt - 1;
					document.getElementById("divTextAndImageCombination").innerHTML = rExistingText + ' ' + '<span style="color:' + rNewTextColor + ';">' + rNewText + '</span>';
					document.getElementById("divBtnPanel").style.display = "none";
					document.getElementById("divTextAndImageOnlyOne").innerHTML = document.getElementById("divTextAndImageOnlyOne").innerHTML;
					
					window.setTimeout(
						function() {
							document.getElementById("divTextAndImageOnlyOne").innerHTML = document.getElementById("divTextAndImageOnlyOne").innerHTML + '<div style="height:10px; border:0px solid red;"></div>' + rNewText;
							document.getElementById("divBtnBackArrow").style.display = "inline-block";
							document.getElementById("divBtnNextArrow").style.display = "inline-block";
						}, 2000
					)
				}
			}

						rInnerHTML += '</div>';					
						break;						
					default:
						break;
				}
				document.getElementById("divBtnPanel").innerHTML = rInnerHTML;

			function doNavigateToURL(rObj, rAction) {
				var rNavURL = "";
				if (rObj.style.cursor=="pointer") {
					switch (rAction.toUpperCase()) {
						case "H":
							rNavURL = "index.html";
							break;
						case "P":
							rNavURL = "today_session_day.html";
							break;
						case "N":
							rNavURL = "today_session_weather.html?DayNumber=" + rSelectedDayNumber + "&MonthNumber=" + rSelectedMonthNumber + "&Day=" + rSelectedDay + "&Month=" + rSelectedMonth;
							break;						
						default:
							break;
					}					
					document.location.href = rNavURL;
				}
			}
