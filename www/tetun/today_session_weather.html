			function doGetParameterByName(name, url = window.location.href) {
				name = name.replace(/[\[\]]/g, '\\$&');
				var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
					results = regex.exec(url);
				if (!results) return null;
				if (!results[2]) return '';
				return decodeURIComponent(results[2].replace(/\+/g, ' '));
			}			
			
			function doUpdateBottomCenterButtonClick(rObj) {
				if (rObj.style.cursor=="pointer") {
					document.getElementById("divThermoMeter").style.display = "none";
					var rTempInt = Number(rObj.id.split("_")[1]);
					var rExistingText = document.getElementById("divTextAndImageCombination").innerHTML;
					rExistingText = "";
					var rNewText = rArrList[rTempInt-1];
					document.getElementById("divTextAndImageCombination").innerHTML = rExistingText + ' ' + '<span style="color:#E26316;">' + rNewText + '</span>';
					document.getElementById("divBtnPanel").style.display = "none";
					document.getElementById("divTextAndImageOnlyOne").innerHTML = document.getElementById("divTextAndImageOnlyOne").innerHTML;

					document.getElementById("vidAni").setAttribute("src", "media/video/weather/weather_" + rTempInt + ".mp4");
					document.getElementById("vidAni").currentTime = 0;
					document.getElementById("vidAni").play();
					document.getElementById("divVidAni").style.display = "block";

					window.setTimeout(
						function() {
							var rTempImgSrc = rObj.getElementsByTagName("img")[0].src;
							document.getElementById("divTextAndImageOnlyOne").innerHTML = document.getElementById("divTextAndImageOnlyOne").innerHTML + '<div style="height:10px; border:0px solid red;"></div>' + '<div><img width="75" height="auto" src="' + rTempImgSrc + '" />';
							document.getElementById("divBtnBackArrow").style.display = "inline-block";
							document.getElementById("divBtnNextArrow").style.display = "inline-block";
						}, 2000
					)					
				}
			}
			
			function doNavigateToURL(rObj, rAction) {
				var rNavURL = "";
				if (rObj.style.cursor=="pointer") {
					switch (rAction.toUpperCase()) {
						case "H":
							rNavURL = "index.html";
							break;
						case "P":
							rNavURL = "today_session_month.html?DayNumber=" + rSelectedDayNumber + "&MonthNumber=" + rSelectedMonthNumber + "&Day=" + rSelectedDay + "&Month=" + rSelectedMonth;
							break;
						case "N":
							if (document.getElementById("ddGroupSelect").value=="") {
								alert("Please select the Group.");
							} else {
								if (rCurrentMonth.length==1) rCurrentMonth = "0" + rCurrentMonth;
								if (rCurrentDate.length==1) rCurrentDate = "0" + rCurrentDate;
								
								//rCurrentDate = rCurrentDate + "-" + rCurrentMonth + "-" + rCurrentFullYear;
								//rCurrentDate = rCurrentDate + "-" + rCurrentMonth;
								//rCurrentDate = document.getElementById("ddDateSelection").value;
								rCurrentDate = rCurrentMonth + "-" + rCurrentDate;
								var rActvityList = "";
								for (var i=0; i<rArrActList.length; i++) {
									if (rCurrentDate.trim()==rArrActList[i].Date.trim()) {
									
										for (var j=0; j<rArrActList[i].ActList.length; j++) {
											var rCurrentActivityTemp = "";
											
											rCurrentActivityTemp = rArrActList[i].ActList[j].Activity;
											if (rActvityList=="") {
												if (rCurrentActivityTemp!="") {
													rActvityList = rCurrentActivityTemp;
												}
											} else {
												if (rCurrentActivityTemp!="") {
													rActvityList = rActvityList + "~" + rCurrentActivityTemp;
												}
											}
										}
										break;
									}
								}
								
								var rFirstActURL = "";
								if (rActvityList=="") {
								} else {
									var rTempSPL = rActvityList.split("~");
									rFirstActURL = rTempSPL[0];
								}
								
								
							
								rSelectedDay = doGetParameterByName('Day');
								rSelectedMonth = doGetParameterByName('Month');
								rSelectedDayNumber = doGetParameterByName('DayNumber');
								rSelectedMonthNumber = doGetParameterByName('MonthNumber');			
								if (rObj.style.cursor=="pointer") {
									if (rFirstActURL=="") {
										//alert("No activities for selected month and day");
									} else {
										rNavURL = rFirstActURL + "?MainActivityList=" + rActvityList;
									}
								}						
								break;
							}
						default:
							break;
					}
					//if (rAction.toUpperCase()!="N" && rNavURL!="") {
					if (rNavURL!="") {
						document.location.href = rNavURL;
					}
				}
			}
